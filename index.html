<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fórmula del Sabor - Einstein</title>
<style>
    body {
        margin: 0;
        background: #000; /* Fondo negro para el contraste */
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden; /* Evita barras de desplazamiento */
    }

    /* CONTENEDOR PRINCIPAL */
    .advert-container {
        position: relative;
        width: 100vw;
        max-width: 500px; /* Ajusta este valor si necesitas un tamaño diferente */
        height: 100vh; /* Ocupa todo el alto */
        display: flex;
        justify-content: center;
        align-items: center;
    }

    /* LA IMAGEN FINAL (CON EL PORTAL YA INTEGRADO) */
    .final-image {
        width: 100%;
        height: 100%;
        object-fit: contain; /* Asegura que la imagen completa sea visible sin cortarse */
        display: block;
        
        /* OPCIONAL: Un ligero drop-shadow para dar volumen */
        filter: drop-shadow(0 0 20px rgba(0, 255, 136, 0.3));
    }
</style>
</head>
<body>

<div class="advert-container">
    <img src="fondo-final.png" alt="Fórmula del Sabor" class="final-image">
</div>

</body>
</html>
