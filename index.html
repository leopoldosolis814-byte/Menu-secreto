<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S2A Studio — Hamburguesería</title>

<meta property="og:type" content="website">
<meta property="og:title" content="Tu pack del mes está listo y activo 🔥">
<meta property="og:description" content="Empezá a publicar hoy y aprovechá cada historia al máximo.">
<meta property="og:image" content="https://res.cloudinary.com/ds2udm1nc/image/upload/c_scale,f_jpg,q_auto,w_600/v1775214668/Copilot_20260403_080908_c6txoy.jpg">

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root {
--bg:#07070f;--bg2:#0e0e1a;--fucsia:#ff2d78;--amarillo:#ffe600;--blanco:#fff;--gris:#666680;--gris2:#333345;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--blanco);font-family:'Nunito',sans-serif;display:none}
header{position:sticky;top:0;background:rgba(7,7,15,.95);padding:16px 24px;display:flex;justify-content:space-between;border-bottom:1px solid rgba(255,45,120,.15)}
.logo{font-family:'Bebas Neue';font-size:26px;letter-spacing:4px}
.logo em{color:var(--fucsia)}
.rubro-tag{font-family:'Bebas Neue';font-size:11px;letter-spacing:4px;color:var(--fucsia)}
.hero{text-align:center;padding:60px 20px}
.hero-title{font-family:'Bebas Neue';font-size:52px}
.hero-title span{color:var(--amarillo)}
.section{border-top:1px solid rgba(255,255,255,.05)}
.section-header{padding:20px;display:flex;justify-content:space-between;cursor:pointer}
.section-body{display:none;padding:10px}
.section.open .section-body{display:block}
.content-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.item{background:var(--bg2);border-radius:10px;overflow:hidden}
.thumb-wrap{aspect-ratio:9/16}
.thumb{width:100%;height:100%;object-fit:cover}
.item-foot{padding:10px}
.btn-dl{display:block;background:var(--fucsia);padding:10px;text-align:center;color:#fff;text-decoration:none;border-radius:6px;margin-top:6px}
.btn-copy{width:100%;margin-top:6px}
</style>
</head>

<body>

<header>
<div class="logo">STORY<em>2</em>ACTION</div>
<div class="rubro-tag">HAMBURGUESERÍA</div>
</header>

<div class="hero">
<div class="hero-title">TU CONTENIDO<br><span>ESTÁ LISTO</span></div>
</div>

<div class="section" id="s-img">
<div class="section-header" onclick="tog('s-img')">
<div>IMÁGENES</div><div>▼</div>
</div>
<div class="section-body"><div class="content-grid" id="gImg"></div></div>
</div>

<div class="section" id="s-vid">
<div class="section-header" onclick="tog('s-vid')">
<div>VIDEOS</div><div>▼</div>
</div>
<div class="section-body"><div class="content-grid" id="gVid"></div></div>
</div>

<script>
const PASSWORD="1234";
const BASE_LINK=new URLSearchParams(location.search).get('link')||"tulocal.com/promo";

function checkAccess(){
const saved=localStorage.getItem("s2a_access");
if(saved===PASSWORD){document.body.style.display="block";return true;}
const pass=prompt("Ingresá tu contraseña");
if(pass===PASSWORD){localStorage.setItem("s2a_access",pass);document.body.style.display="block";return true;}
document.body.innerHTML="<h2 style='text-align:center;margin-top:50%'>Acceso denegado</h2>";return false;
}

const IMGS=[
{ id:1, src:"https://res.cloudinary.com/ds2udm1nc/image/upload/v1775263235/Gemini_Generated_Image_bruchsbruchsbruc_etzmgj.png", link:BASE_LINK },
{ id:2, src:"https://res.cloudinary.com/ds2udm1nc/image/upload/v1775263237/Gemini_Generated_Image_ehiim7ehiim7ehii_i5crwt.png", link:BASE_LINK }
];

const VIDS=[
{ id:3, src:null, link:BASE_LINK }
];

const activas=new Set((new URLSearchParams(location.search).get('activas')||"").split(",").map(Number));

function makeItem(it,isVid){
const on=activas.has(it.id);
const media=it.src
? (isVid?`<video class="thumb" src="${it.src}" controls></video>`:`<img class="thumb" src="${it.src}">`)
:`<div style="display:flex;align-items:center;justify-content:center;height:100%">PRÓXIMO</div>`;

const btn=on&&it.src?`<a class="btn-dl" href="${it.src.replace('/upload/','/upload/fl_attachment/')}" download>⬇ DESCARGAR</a>`:"";

return `<div class="item">
<div class="thumb-wrap">${media}</div>
<div class="item-foot">
<button class="btn-copy" onclick="navigator.clipboard.writeText('${it.link}')">COPIAR LINK</button>
${btn}
</div>
</div>`;
}

function render(){
const gI=document.getElementById("gImg");
const gV=document.getElementById("gVid");
IMGS.forEach(i=>gI.innerHTML+=makeItem(i,false));
VIDS.forEach(v=>gV.innerHTML+=makeItem(v,true));
}

function tog(id){document.getElementById(id).classList.toggle("open");}

if(checkAccess()) render();
</script>

</body>
</html>
