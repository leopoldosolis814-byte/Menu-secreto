<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Promo Elenos</title> <style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    background: #000;
    font-family: 'Segoe UI', sans-serif;
    color: white;
    overflow: hidden;
  }

  .container {
    width: 100vw;
    height: 100dvh; 
    display: flex;
    flex-direction: column;
    position: relative;
  }

  /* --- LOGO: MÁS GRANDE --- */
  .logo-overlay {
    position: absolute;
    top: 25px; /* Un poco más abajo */
    left: 25px; /* Un poco más a la derecha */
    padding: 0; 
    background: none; 
    z-index: 20;
    filter: drop-shadow(0 3px 6px rgba(0,0,0,0.8)); /* Sombra más fuerte */
  }

  /* Estilos para la imagen del logo */
  .logo-overlay img {
    height: 90px; /* --- LOGO MÁS GRANDE (Antes 60px) --- */
    width: auto;
    display: block;
  }
  /* -------------------------- */

  /* --- VÍDEO: CENTRADO --- */
  .bg-video-container {
    width: 100%;
    height: 45vh;
    overflow: hidden; /* Para recortar lo sobrante */
    position: relative;
  }

  .bg-video {
    width: 100%;
    height: 100%;
    object-fit: cover; /* Cubre el área */
    object-position: center; /* --- CENTRA EL VÍDEO (Antes predeterminado) --- */
    display: block;
  }

  .badge {
    background: #e63946;
    color: #fff;
    padding: 6px 14px;
    border-radius: 20px;
    font-weight: bold;
    font-size: 12px;
    align-self: center;
    margin-top: -12px;
    z-index: 10;
  }

  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-evenly; 
    align-items: center;
    text-align: center;
    padding: 10px 0 25px 0;
  }

  .title { 
    font-size: 26px; 
    font-weight: bold; 
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  
  .price-box {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .old-price { color: #888; text-decoration: line-through; font-size: 20px; }
  .price { color: #ffcc00; font-size: 60px; font-weight: bold; line-height: 1; }

  .btn {
    background: #25d366;
    color: #fff;
    text-decoration: none;
    padding: 16px;
    width: 85%;
    border-radius: 12px;
    font-weight: bold;
    font-size: 18px;
    box-shadow: 0 4px 20px rgba(37, 211, 102, 0.4);
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 4px 20px rgba(37,211,102,0.4); transform: scale(1); }
    50% { box-shadow: 0 4px 35px rgba(37,211,102,0.7); transform: scale(1.02); }
  }

  .extra { font-size: 12px; color: #666; }
</style>
</head>
<body>

<div class="container">

  <div class="logo-overlay">
    <img src="Copilot_20260331_220454.png" alt="Logo Elenos">
  </div>
  <div class="bg-video-container">
    <video
      class="bg-video"
      src="https://res.cloudinary.com/ds2udm1nc/video/upload/v1773845217/20260318_103434909_2_vsa1hx.mp4"
      autoplay
      muted
      loop
      playsinline
    ></video>
  </div>
  
  <div class="badge">DOBLE CARNE + CHEDDAR + PAPAS 🔥</div>
  
  <div class="content">
    <div class="title">PROMO ELENOS</div> <div class="price-box">
      <div class="old-price">$8.000</div>
      <div class="price">$6.000</div>
    </div>

    <a href="https://wa.me/5493794655679?text=Hola!%20Quiero%20la%20promo%20Elenos!%0AEnviar%20a%2C%20Direcci%C3%B3n%3A%0AModo%20de%20pago%20(efectivo%2C%20transferencia)%3A%0AComentarios%20adicionales%3A" class="btn">
      PEDIR AHORA 🍔
    </a>
    
    <div class="extra">Entrega rápida ⚡</div>
  </div>

</div>

</body>
</html>
