<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Story Nail Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    background: #000;
  }

  .scene {
    position: relative;
    width: 1080px;
    height: 1920px;
  }

  video {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 1;
  }

  .overlay {
    position: absolute;
    inset: 0;
    z-index: 2;
    background: linear-gradient(
      to bottom,
      rgba(0,0,0,0.45) 0%,
      rgba(0,0,0,0.0) 40%,
      rgba(0,0,0,0.2) 70%,
      rgba(0,0,0,0.55) 100%
    );
  }

  /* ── TEXTO SUPERIOR ── */
  .top-text {
    position: absolute;
    top: 80px;
    left: 0;
    right: 0;
    z-index: 10;
    text-align: center;
    padding: 0 60px;
  }

  .headline {
    font-family: 'Pacifico', cursive;
    font-size: 88px;
    line-height: 1.15;
    color: #fff;
    text-shadow: 3px 3px 0 rgba(0,0,0,0.4), 0 0 30px rgba(255,180,200,0.3);
    opacity: 0;
    animation: fadeSlideUp 0.8s cubic-bezier(0.22,1,0.36,1) 0.3s forwards;
  }

  .headline .pink  { color: #ff6eb4; }
  .headline .yellow { color: #ffe066; }

  .sub-pill {
    display: inline-block;
    margin-top: 36px;
    background: linear-gradient(90deg, #ff6eb4, #ff9de2);
    border-radius: 60px;
    padding: 22px 52px;
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 48px;
    color: #fff;
    text-shadow: 1px 1px 4px rgba(0,0,0,0.3);
    box-shadow: 0 8px 30px rgba(255,110,180,0.5);
    opacity: 0;
    animation: fadeSlideUp 0.7s cubic-bezier(0.22,1,0.36,1) 1.2s forwards;
  }

  /* ── DESTELLOS DECORATIVOS ── */
  .sparkles {
    position: absolute;
    top: 60px;
    left: 0;
    right: 0;
    z-index: 9;
    pointer-events: none;
  }

  .spark {
    position: absolute;
    font-size: 48px;
    opacity: 0;
    animation: sparkle 1.5s ease-in-out infinite alternate;
  }
  .spark:nth-child(1) { top: 20px;  left: 80px;  animation-delay: 0.2s; }
  .spark:nth-child(2) { top: 10px;  left: 900px; animation-delay: 0.6s; }
  .spark:nth-child(3) { top: 200px; left: 40px;  animation-delay: 1.0s; }
  .spark:nth-child(4) { top: 180px; left: 950px; animation-delay: 0.4s; }
  .spark:nth-child(5) { top: 380px; left: 120px; animation-delay: 0.8s; }
  .spark:nth-child(6) { top: 360px; left: 880px; animation-delay: 1.2s; }

  /* ── CTA CORAZÓN ── */
  .cta-wrap {
    position: absolute;
    bottom: 160px;
    left: 0;
    right: 0;
    z-index: 10;
    display: flex;
    justify-content: center;
    opacity: 0;
    animation: fadeSlideUp 0.7s ease 2.0s forwards;
  }

  .cta-heart {
    position: relative;
    background: linear-gradient(135deg, #ff4d8d, #ff85c0);
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    width: 420px;
    height: 360px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    box-shadow: 0 12px 50px rgba(255,77,141,0.6);
    animation: heartbeat 1.8s ease-in-out 2.7s infinite;
  }

  .cta-heart::before,
  .cta-heart::after {
    content: '';
    position: absolute;
    width: 210px;
    height: 210px;
    background: linear-gradient(135deg, #ff4d8d, #ff85c0);
    border-radius: 50%;
    top: -90px;
  }
  .cta-heart::before { left: 0; }
  .cta-heart::after  { right: 0; }

  .cta-text {
    position: relative;
    z-index: 2;
    font-family: 'Pacifico', cursive;
    font-size: 72px;
    color: #fff;
    text-align: center;
    line-height: 1.1;
    text-shadow: 2px 2px 6px rgba(0,0,0,0.3);
  }

  .cta-arrows {
    position: relative;
    z-index: 2;
    font-size: 52px;
    margin-top: 8px;
    animation: bounceArrow 0.6s ease-in-out 2.7s infinite alternate;
  }

  /* ── FOOTER ── */
  .footer {
    position: absolute;
    bottom: 50px;
    left: 0;
    right: 0;
    z-index: 10;
    text-align: center;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 40px;
    color: rgba(255,255,255,0.7);
    letter-spacing: 2px;
    opacity: 0;
    animation: fadeIn 0.6s ease 2.4s forwards;
  }

  /* ── KEYFRAMES ── */
  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 0.7; }
  }

  @keyframes sparkle {
    from { opacity: 0; transform: scale(0.7) rotate(-10deg); }
    to   { opacity: 1; transform: scale(1.2) rotate(10deg); }
  }

  @keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    50%       { transform: scale(1.07); }
  }

  @keyframes bounceArrow {
    from { transform: translateY(0); }
    to   { transform: translateY(10px); }
  }
</style>
</head>
<body>
<div class="scene">

  <video autoplay muted loop playsinline>
    <source src="https://raw.githubusercontent.com/leopoldosolis814-byte/Menu-secreto/main/the_woman_walks_forward_naturally_hair_moves_gently_with_her_stride_coat_sways_slightly_as_she_walk_dszx8sdj8mdjtjbiz240_1.mp4" type="video/mp4">
  </video>

  <div class="overlay"></div>

  <div class="sparkles">
    <span class="spark">✨</span>
    <span class="spark">💕</span>
    <span class="spark">⭐</span>
    <span class="spark">✨</span>
    <span class="spark">💫</span>
    <span class="spark">💕</span>
  </div>

  <div class="top-text">
    <div class="headline">
      Hay un <span class="pink">detalle</span> que<br>
      está cambiando<br>
      <span class="yellow">todos los looks</span><br>
      este mes...
    </div>
    <div class="sub-pill">Y empieza en las manos... 👆</div>
  </div>

  <div class="cta-wrap">
    <div class="cta-heart">
      <div class="cta-text">¡Descubrilo<br>acá!</div>
      <div class="cta-arrows">▼▼</div>
    </div>
  </div>

  <div class="footer">Story2Action</div>

</div>
</body>
</html>
