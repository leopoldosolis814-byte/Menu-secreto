<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Portal Animado de Einstein</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #1a1a1a;
        }

        .contenedor-imagen {
            position: relative;
            /* Ajustamos al tamaño proporcional de la imagen */
            width: 500px; 
            height: 740px;
            background-image: url('Copilot_20260314_081306.png');
            background-size: contain;
            background-repeat: no-repeat;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .portal-animado {
            position: absolute;
            /* Coordenadas aproximadas para tapar el portal original */
            top: 154px;
            left: 144px;
            width: 178px;
            height: 222px;
            
            border-radius: 50%;
            background: radial-gradient(circle, #affd1a 10%, #27ae60 60%, #145a32 90%);
            
            /* Aplicamos el filtro de ruido que definimos abajo en el SVG */
            filter: url(#ruido-portal) blur(2px);
            opacity: 0.7;
            mix-blend-mode: screen;
            
            animation: latido 3s ease-in-out infinite alternate;
        }

        @keyframes latido {
            from { transform: scale(1); opacity: 0.6; }
            to { transform: scale(1.03); opacity: 0.8; }
        }
    </style>
</head>
<body>

    <div class="contenedor-imagen">
        <div class="portal-animado"></div>
    </div>

    <svg style="display: none;">
        <filter id="ruido-portal">
            <feTurbulence type="turbulence" baseFrequency="0.015" numOctaves="3" seed="2">
                <animate attributeName="baseFrequency" dur="10s" values="0.015;0.025;0.015" repeatCount="indefinite" />
            </feTurbulence>
            <feDisplacementMap in="SourceGraphic" scale="25" />
        </filter>
    </svg>

</body>
</html>
