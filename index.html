<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Promo El Puis</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    background: #000;
    font-family: 'Segoe UI', sans-serif;
    color: white;
    overflow: hidden;
  }

  .container {
    width: 100vw;
    height: 100dvh; 
    display: flex;
    flex-direction: column;
    position: relative;
  }

  .logo-overlay {
    position: absolute;
    top: 20px;
    left: 20px;
    background: rgba(0, 0, 0, 0.6);
    padding: 8px 15px;
    border-radius: 50px;
    font-size: 18px;
    font-weight: bold;
    color: #ffcc00;
    z-index: 20;
    backdrop-filter: blur(5px);
    border: 1px solid rgba(255, 204, 0, 0.3);
  }

  .bg-video {
    width: 100%;
    height: 45vh;
    object-fit: cover;
    display: block;
  }

  .badge {
    background: #e63946;
    color: #fff;
    padding: 6px 14px;
    border-radius: 20px;
    font-weight: bold;
    font-size: 12px;
    align-self: center;
    margin-top: -12px;
    z-index: 10;
  }

  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-evenly; 
    align-items: center;
    text-align: center;
    padding: 10px 0 25px 0;
  }

  .title { 
    font-size: 26px; 
    font-weight: bold; 
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  
  .price-box {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .old-price { color: #888; text-decoration: line-through; font-size: 20px; }
  .price { color: #ffcc00; font-size: 60px; font-weight: bold; line-height: 1; }

  .btn {
    background: #25d366;
    color: #fff;
    text-decoration: none;
    padding: 16px;
    width: 85%;
    border-radius: 12px;
    font-weight: bold;
    font-size: 18px;
    box-shadow: 0 4px 20px rgba(37, 211, 102, 0.4);
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 4px 20px rgba(37,211,102,0.4); transform: scale(1); }
    50% { box-shadow: 0 4px 35px rgba(37,211,102,0.7); transform: scale(1.02); }
  }

  .extra { font-size: 12px; color: #666; }
</style>
</head>
<body>

<div class="container">

  <div class="logo-overlay">🍔 El Puis</div>

  <video
    class="bg-video"
    src="https://res.cloudinary.com/ds2udm1nc/video/upload/v1773845217/20260318_103434909_2_vsa1hx.mp4"
    autoplay
    muted
    loop
    playsinline
  ></video>
  
  <div class="badge">DOBLE CARNE + CHEDDAR + PAPAS 🔥</div>
  
  <div class="content">
    <div class="title">PROMO DEL DÍA</div>

    <div class="price-box">
      <div class="old-price">$8.000</div>
      <div class="price">$6.000</div>
    </div>

    <a href="https://wa.me/5493794655679?text=Hola!%20Quiero%20la%20promo%20inc%C3%B3gnita!%0AEnviar%20a%2C%20Direcci%C3%B3n%3A%0AModo%20de%20pago%20(efectivo%2C%20transferencia)%3A%0AComentarios%20adicionales%3A" class="btn">
      PEDIR AHORA 🍔
    </a>
    
    <div class="extra">Entrega rápida ⚡</div>
  </div>

</div>

</body>
</html>
