<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Promo El Puis</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    background: #000;
    font-family: sans-serif;
    overflow: hidden; /* Evita el scroll accidental */
  }

  .container {
    width: 100vw;
    height: 100vh; /* Altura exacta de la pantalla */
    display: flex;
    flex-direction: column;
    background: #000;
  }

  .bg-img {
    width: 100%;
    height: 35vh; /* Reducimos un poco para ganar espacio abajo */
    object-fit: cover;
  }

  .badge {
    background: #e63946;
    color: #fff;
    padding: 6px 12px;
    border-radius: 20px;
    font-weight: bold;
    font-size: 11px;
    align-self: center;
    margin-top: -12px;
    z-index: 10;
    text-transform: uppercase;
  }

  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-around; /* Distribuye equitativamente */
    align-items: center;
    text-align: center;
    padding: 10px 0;
  }

  .logo { color: #ffcc00; font-size: 20px; }
  .title { color: #fff; font-size: 22px; font-weight: bold; }
  
  .price-section {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .old-price { color: #888; text-decoration: line-through; font-size: 18px; }
  .price { color: #ffcc00; font-size: 55px; font-weight: bold; line-height: 1; }

  .btn {
    background: #25d366;
    color: #fff;
    text-decoration: none;
    padding: 15px;
    width: 85%;
    border-radius: 12px;
    font-weight: bold;
    font-size: 18px;
    box-shadow: 0 4px 15px rgba(37, 211, 102, 0.2);
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
  }

  /* Animación sutil para que el botón resalte */
  .btn {
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.03); }
    100% { transform: scale(1); }
  }
</style>
</head>
<body>

<div class="container">
  <img src="./Burgerr.png" class="bg-img">
  <div class="badge">DOBLE CARNE + CHEDDAR + PAPAS 🔥</div>
  
  <div class="content">
    <div>
      <div class="logo">🍔 El Puis</div>
      <div class="title">PROMO DEL DÍA</div>
    </div>

    <div class="price-section">
      <div class="old-price">$8.000</div>
      <div class="price">$6.000</div>
    </div>

    <a href="https://wa.me/5493794657659?text=Hola!%20Quiero%20la%20promo" class="btn">
      PEDIR AHORA 🍔
    </a>
  </div>
</div>

</body>
</html>
