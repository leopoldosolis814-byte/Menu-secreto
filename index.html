<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Story Nail Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    background: #000;
  }

  .scene {
    position: relative;
    width: 1080px;
    height: 1920px;
  }

  video {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 1;
  }

  .overlay {
    position: absolute;
    inset: 0;
    z-index: 2;
    background: linear-gradient(
      to bottom,
      rgba(0,0,0,0.5) 0%,
      rgba(0,0,0,0.0) 40%,
      rgba(0,0,0,0.2) 70%,
      rgba(0,0,0,0.6) 100%
    );
  }

  .content {
    opacity: 0;
    transition: opacity 0.5s ease;
  }
  .content.visible { opacity: 1; }

  .top-text {
    position: absolute;
    top: 80px;
    left: 0;
    right: 0;
    z-index: 10;
    text-align: center;
    padding: 0 60px;
  }

  .headline {
    font-family: 'Pacifico', cursive;
    font-size: 88px;
    line-height: 1.2;
    color: #fff;
    text-shadow: 3px 3px 0 rgba(0,0,0,0.4);
    min-height: 440px;
  }

  .pink   { color: #ff6eb4; }
  .yellow { color: #ffe066; }

  .cursor {
    display: inline-block;
    width: 5px;
    height: 80px;
    background: #fff;
    margin-left: 4px;
    vertical-align: middle;
    animation: blink 0.7s step-end infinite;
  }

  .sub-pill {
    display: inline-block;
    margin-top: 40px;
    background: linear-gradient(90deg, #ff6eb4, #ff9de2);
    border-radius: 60px;
    padding: 22px 52px;
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 48px;
    color: #fff;
    box-shadow: 0 8px 30px rgba(255,110,180,0.5);
    opacity: 0;
    transition: opacity 0.6s ease;
  }
  .sub-pill.visible { opacity: 1; }

  .sparkles {
    position: absolute;
    top: 60px;
    left: 0;
    right: 0;
    z-index: 9;
    pointer-events: none;
  }

  .spark {
    position: absolute;
    font-size: 48px;
    opacity: 0;
    animation: sparkle 1.5s ease-in-out infinite alternate;
  }
  .spark:nth-child(1) { top: 20px;  left: 80px;  animation-delay: 0.2s; }
  .spark:nth-child(2) { top: 10px;  left: 900px; animation-delay: 0.6s; }
  .spark:nth-child(3) { top: 200px; left: 40px;  animation-delay: 1.0s; }
  .spark:nth-child(4) { top: 180px; left: 950px; animation-delay: 0.4s; }
  .spark:nth-child(5) { top: 400px; left: 100px; animation-delay: 0.8s; }
  .spark:nth-child(6) { top: 380px; left: 880px; animation-delay: 1.2s; }

  .cta-wrap {
    position: absolute;
    bottom: 160px;
    left: 0;
    right: 0;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    opacity: 0;
    transition: opacity 0.6s ease;
  }
  .cta-wrap.visible { opacity: 1; }

  .cta-btn {
    background: linear-gradient(135deg, #ff4d8d, #ff85c0);
    border-radius: 40px;
    padding: 40px 100px;
    font-family: 'Pacifico', cursive;
    font-size: 72px;
    color: #fff;
    text-align: center;
    box-shadow: 0 12px 50px rgba(255,77,141,0.6);
    animation: heartbeat 1.8s ease-in-out infinite;
  }

  .cta-arrow {
    font-size: 60px;
    color: #ff6eb4;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
    animation: bounceArrow 0.6s ease-in-out infinite alternate;
  }

  .footer {
    position: absolute;
    bottom: 50px;
    left: 0;
    right: 0;
    z-index: 10;
    text-align: center;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 40px;
    color: rgba(255,255,255,0.6);
    letter-spacing: 2px;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0; }
  }
  @keyframes sparkle {
    from { opacity: 0; transform: scale(0.7) rotate(-10deg); }
    to   { opacity: 1; transform: scale(1.2) rotate(10deg); }
  }
  @keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    50%       { transform: scale(1.05); }
  }
  @keyframes bounceArrow {
    from { transform: translateY(0); }
    to   { transform: translateY(12px); }
  }
</style>
</head>
<body>
<div class="scene">

  <video id="vid" autoplay muted loop playsinline>
    <source src="https://raw.githubusercontent.com/leopoldosolis814-byte/Menu-secreto/main/the_woman_walks_forward_naturally_hair_moves_gently_with_her_stride_coat_sways_slightly_as_she_walk_dszx8sdj8mdjtjbiz240_1.mp4" type="video/mp4">
  </video>

  <div class="overlay"></div>

  <div class="sparkles content" id="sparkles">
    <span class="spark">✨</span>
    <span class="spark">💕</span>
    <span class="spark">⭐</span>
    <span class="spark">✨</span>
    <span class="spark">💫</span>
    <span class="spark">💕</span>
  </div>

  <div class="top-text content" id="topText">
    <div class="headline" id="headline"><span class="cursor"></span></div>
    <div class="sub-pill" id="subPill">Y empieza en las manos... 👆</div>
  </div>

  <div class="cta-wrap" id="cta">
    <div class="cta-btn">¡Descubrilo acá!</div>
    <div class="cta-arrow">▼</div>
  </div>

  <div class="footer content" id="footer">Story2Action</div>

</div>

<script>
  const video = document.getElementById('vid');

  const segments = [
    { text: 'Hay un ', cls: '' },
    { text: 'detalle', cls: 'pink' },
    { text: ' que\nestá cambiando\n', cls: '' },
    { text: 'todos los looks', cls: 'yellow' },
    { text: '\neste mes...', cls: '' },
  ];

  const chars = [];
  segments.forEach(seg => {
    for (let c of seg.text) {
      chars.push({ char: c, cls: seg.cls });
    }
  });

  function startAnimation() {
    document.querySelectorAll('.content').forEach(el => el.classList.add('visible'));

    const headline = document.getElementById('headline');
    const cursor = headline.querySelector('.cursor');
    const subPill = document.getElementById('subPill');
    const cta = document.getElementById('cta');

    let i = 0;
    let textNode = document.createElement('span');
    headline.insertBefore(textNode, cursor);

    const interval = setInterval(() => {
      if (i < chars.length) {
        const { char, cls } = chars[i];
        if (char === '\n') {
          textNode.appendChild(document.createElement('br'));
        } else if (cls) {
          const span = document.createElement('span');
          span.className = cls;
          span.textContent = char;
          textNode.appendChild(span);
        } else {
          textNode.appendChild(document.createTextNode(char));
        }
        i++;
      } else {
        clearInterval(interval);
        cursor.style.display = 'none';
        subPill.classList.add('visible');
        setTimeout(() => cta.classList.add('visible'), 800);
      }
    }, 90);
  }

  video.addEventListener('canplay', startAnimation, { once: true });
  if (video.readyState >= 3) startAnimation();
</script>

</body>
</html>
