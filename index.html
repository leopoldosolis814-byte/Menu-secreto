<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Promo El Puis</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    background: #000;
    font-family: 'Segoe UI', sans-serif;
    color: white;
    overflow: hidden; /* Volvemos a bloquear el scroll porque ahora sí debería entrar */
  }

  .container {
    width: 100vw;
    height: 100dvh; 
    display: flex;
    flex-direction: column;
    position: relative; /* Necesario para posicionar cosas encima */
  }

  /* EL LOGO SOBRE LA IMAGEN */
  .logo-overlay {
    position: absolute;
    top: 20px;
    left: 20px;
    background: rgba(0, 0, 0, 0.6); /* Fondo semitransparente para que se lea bien */
    padding: 8px 15px;
    border-radius: 50px;
    font-size: 18px;
    font-weight: bold;
    color: #ffcc00;
    z-index: 20;
    backdrop-filter: blur(5px); /* Efecto de vidrio esmerilado */
    border: 1px solid rgba(255, 204, 0, 0.3);
  }

  .bg-img {
    width: 100%;
    height: 45vh; /* Altura generosa para que la hamburguesa luzca */
    object-fit: cover;
  }

  .badge {
    background: #e63946;
    color: #fff;
    padding: 6px 14px;
    border-radius: 20px;
    font-weight: bold;
    font-size: 12px;
    align-self: center;
    margin-top: -12px;
    z-index: 10;
  }

  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-evenly; 
    align-items: center;
    text-align: center;
    padding: 10px 0 25px 0;
  }

  .title { 
    font-size: 26px; 
    font-weight: bold; 
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  
  .price-box {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .old-price { color: #888; text-decoration: line-through; font-size: 20px; }
  .price { color: #ffcc00; font-size: 60px; font-weight: bold; line-height: 1; }

  .btn {
    background: #25d366;
    color: #fff;
    text-decoration: none;
    padding: 16px;
    width: 85%;
    border-radius: 12px;
    font-weight: bold;
    font-size: 18px;
    box-shadow: 0 4px 20px rgba(37, 211, 102, 0.4);
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
  }

  .extra { font-size: 12px; color: #666; }

</style>
</head>
<body>

<div class="container">
  <div class="logo-overlay">🍔 El Puis</div>

  <img src="./Burgerr.png" class="bg-img" alt="Hamburguesa El Puis">
  
  <div class="badge">DOBLE CARNE + CHEDDAR + PAPAS 🔥</div>
  
  <div class="content">
    <div class="title">PROMO DEL DÍA</div>

    <div class="price-box">
      <div class="old-price">$8.000</div>
      <div class="price">$6.000</div>
    </div>

    <a href="https://wa.me/5493794657659?text=Hola!%20Quiero%20la%20promo" class="btn">
      PEDIR AHORA 🍔
    </a>
    
    <div class="extra">Entrega rápida ⚡</div>
  </div>
</div>

</body>
</html>
