<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="no-referrer">
<title>Promo Elenos</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    background: #000; /* El fondo general sigue negro para que el video luzca */
    font-family: 'Segoe UI', sans-serif;
    color: white;
    overflow: hidden;
  }

  .container {
    width: 100vw;
    height: 100dvh; 
    display: flex;
    flex-direction: column;
    position: relative;
  }

  /* --- LOGO --- */
  .logo-overlay {
    position: absolute;
    top: 25px;
    left: 25px;
    z-index: 20;
    filter: drop-shadow(0 3px 6px rgba(0,0,0,0.8));
  }

  .logo-overlay img {
    height: 90px;
    width: auto;
    display: block;
  }

  /* --- VÍDEO --- */
  .bg-video-container {
    width: 100%;
    height: 45vh;
    overflow: hidden;
    position: relative;
    background: #000;
  }

  .bg-video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    display: block;
  }

  .badge {
    background: #e63946;
    color: #fff;
    padding: 6px 14px;
    border-radius: 20px;
    font-weight: bold;
    font-size: 12px;
    align-self: center;
    margin-top: -12px;
    z-index: 10;
  }

  /* --- CONTENIDO CON FONDO BLANCO --- */
  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-evenly; 
    align-items: center;
    text-align: center;
    padding: 10px 0 25px 0;
    /* CAMBIO A BLANCO AQUÍ */
    background-color: #ffffff; 
    color: #000000; /* Texto en negro para que se vea sobre el blanco */
    border-top-left-radius: 20px; /* Opcional: redondeado para que se vea más moderno */
    border-top-right-radius: 20px;
  }

  .title { 
    font-size: 26px; 
    font-weight: bold; 
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #000; /* Título en negro */
  }
  
  .price-box {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .old-price { color: #888; text-decoration: line-through; font-size: 20px; }
  .price { color: #d32f2f; font-size: 60px; font-weight: bold; line-height: 1; } /* Rojo para que destaque en el blanco */

  .btn {
    background: #25d366;
    color: #fff;
    text-decoration: none;
    padding: 16px;
    width: 85%;
    border: none; /* Quitamos borde por si usas etiqueta button */
    border-radius: 12px;
    font-weight: bold;
    font-size: 18px;
    box-shadow: 0 4px 20px rgba(37, 211, 102, 0.4);
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 4px 20px rgba(37,211,102,0.4); transform: scale(1); }
    50% { box-shadow: 0 4px 35px rgba(37,211,102,0.7); transform: scale(1.02); }
  }

  .extra { font-size: 12px; color: #999; }
</style>
</head>
<body>

<div class="container">

  <div class="logo-overlay">
    <img src="Copilot_20260331_220454.png" alt="Logo Elenos">
  </div>

  <div class="bg-video-container">
    <video
      class="bg-video"
      src="https://res.cloudinary.com/ds2udm1nc/video/upload/v1773845217/20260318_103434909_2_vsa1hx.mp4"
      autoplay
      muted
      loop
      playsinline
    ></video>
  </div>
  
  <div class="badge">DOBLE CARNE + CHEDDAR + PAPAS 🔥</div>
  
  <div class="content">
    <div class="title">PROMO ELENOS</div>

    <div class="price-box">
      <div class="old-price">$8.000</div>
      <div class="price">$6.000</div>
    </div>

    <button onclick="enviarWhatsApp()" class="btn">
      PEDIR AHORA 🍔
    </button>
    
    <div class="extra">Entrega rápida ⚡</div>
  </div>

</div>

<script>
  function enviarWhatsApp() {
    // El enlace wa.me es más directo que api.whatsapp
    const url = "https://wa.me/5493794522749?text=Hola!%20Quiero%20la%20promo%20Elenos!%0AEnviar%20a%2C%20Direcci%C3%B3n%3A%0AModo%20de%20pago%20(efectivo%2C%20transferencia)%3A%0AComentarios%20adicionales%3A";
    
    // Intentamos abrirlo en una ventana nueva, esto a veces salta el aviso de Instagram
    const win = window.open(url, '_blank', 'noopener,noreferrer');
    
    // Si por alguna razón el navegador bloquea el popup, forzamos la redirección en la misma pestaña
    if (!win || win.closed || typeof win.closed == 'undefined') {
        window.location.href = url;
    }
  }
</script>

</body>
</html>
