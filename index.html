<!DOCTYPE html><html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Promo El Puis</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#000;
  font-family:Arial, Helvetica, sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}
.container{
  width:100vw;
  max-width:500px;
  aspect-ratio:1/1;
  background:#000;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  border-radius:16px;
}
.bg-img{
  width:100%;
  height:45%;
  object-fit:cover;
}
.badge{
  background:#e63946;
  color:#fff;
  padding:6px 14px;
  border-radius:20px;
  font-weight:bold;
  font-size:12px;
  align-self:center;
  margin-top:-14px;
}
.content{
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  gap:10px;
  padding:10px;
}
.logo{
  color:#ffcc00;
  font-size:22px;
}
.title{
  font-size:22px;
  font-weight:bold;
}
.price{
  color:#ffcc00;
  font-size:48px;
  font-weight:bold;
}
