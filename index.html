<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S2A Studio — Hamburguesería</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  /* Mantenemos tus variables y estilos base intactos */
  :root {
    --bg: #07070f;
    --bg2: #0e0e1a;
    --fucsia: #ff2d78;
    --amarillo: #ffe600;
    --blanco: #ffffff;
    --gris: #666680;
    --gris2: #333345;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--blanco); font-family: 'Nunito', sans-serif; min-height: 100vh; padding-bottom: 80px; }

  /* Header y Hero originales */
  header { position: sticky; top: 0; z-index: 100; background: rgba(7,7,15,0.95); backdrop-filter: blur(16px); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(255,45,120,0.15); }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 4px; }
  .logo em { color: var(--fucsia); font-style: normal; }

  .hero { padding: 72px 28px 64px; text-align: center; }
  .hero-title { font-family: 'Bebas Neue', sans-serif; font-size: 58px; line-height: 0.95; margin-bottom: 20px; }
  .hero-title span { color: var(--amarillo); }

  /* Estilos de los ítems de la landing */
  .content-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 16px; }
  .item { background: var(--bg2); border-radius: 10px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); transition: border-color 0.2s ease; }
  .item.activa { border-color: rgba(255,45,120,0.3); }

  .thumb-wrap { position: relative; aspect-ratio: 9/16; background: #0a0a14; overflow: hidden; }
  .thumb { width: 100%; height: 100%; object-fit: cover; }
  .thumb-num { position: absolute; top: 8px; left: 8px; background: rgba(7,7,15,0.8); font-family: 'Bebas Neue', sans-serif; font-size: 10px; padding: 3px 7px; border-radius: 3px; color: var(--gris); }

  .item-foot { padding: 10px; }
  
  /* Mejoramos la visibilidad del link de la landing */
  .item-link { font-size: 10px; color: var(--amarillo); margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 900; }

  .btn-copy {
    display: block; width: 100%; background: transparent; color: var(--gris); font-family: 'Bebas Neue', sans-serif; font-size: 11px; letter-spacing: 1px; padding: 8px; border-radius: 6px; border: 1px solid var(--gris2); cursor: pointer; margin-bottom: 6px;
  }
  .btn-copy.copied { border-color: var(--fucsia); color: var(--fucsia); }

  .btn-dl { display: block; width: 100%; background: var(--fucsia); color: var(--blanco); font-family: 'Bebas Neue', sans-serif; font-size: 13px; text-align: center; padding: 10px; border-radius: 6px; text-decoration: none; }

  .lock-layer { position: absolute; inset: 0; background: rgba(7,7,15,0.75); display: flex; align-items: center; justify-content: center; backdrop-filter: blur(2px); }
  .lock-label { font-family: 'Bebas Neue', sans-serif; font-size: 9px; color: var(--fucsia); letter-spacing: 3px; }
</style>
</head>
<body>

<header>
  <div class="logo">STORY<em>2</em>ACTION</div>
  <div style="font-family:'Bebas Neue'; font-size:11px; color:var(--fucsia); letter-spacing:3px;">HAMBURGUESERÍA</div>
</header>

<div class="hero">
  <div class="hero-title">TU CONTENIDO<br><span>ESTÁ LISTO</span></div>
  <div style="width:60px; height:2px; background:var(--fucsia); margin: 0 auto 20px;"></div>
  <p style="color:var(--gris); font-size:13px;">Descargá las creatividades para tu landing y pegá el enlace en tus stories.</p>
</div>

<div class="content-grid" id="mainGrid"></div>

<footer>
  <div style="text-align:center; padding:40px; font-family:'Bebas Neue'; font-size:11px; color:#2a2a3a; letter-spacing:4px;">STORY<em>2</em>ACTION · 2026</div>
</footer>

<script>
  // Mantenemos tus URLs originales de la landing
  const IMGS = [
    { id:1, src:"https://res.cloudinary.com/ds2udm1nc/image/upload/v1775263235/Gemini_Generated_Image_bruchsbruchsbruc_etzmgj.png", link:"tulocal.com/promo" },
    { id:2, src:"https://res.cloudinary.com/ds2udm1nc/image/upload/v1775263237/Gemini_Generated_Image_ehiim7ehiim7ehii_i5crwt.png", link:"tulocal.com/promo" },
    { id:3, src:"https://res.cloudinary.com/ds2udm1nc/image/upload/v1775263237/Gemini_Generated_Image_sbvguqsbvguqsbvg_vjubkz.png", link:"tulocal.com/promo" },
    { id:4, src:"https://res.cloudinary.com/ds2udm1nc/image/upload/v1775263238/Copilot_20260315_233635_sbtrat.png", link:"tulocal.com/promo" }
  ];

  const activas = new Set((new URLSearchParams(window.location.search).get('activas') || '').split(',').map(Number));

  function render() {
    const grid = document.getElementById('mainGrid');
    IMGS.forEach(it => {
      const on = activas.has(it.id);
      grid.innerHTML += `
        <div class="item ${on ? 'activa' : ''}">
          <div class="thumb-wrap">
            <img src="${it.src}" class="thumb">
            <div class="thumb-num">IMG ${String(it.id).padStart(2,'0')}</div>
            ${!on ? '<div class="lock-layer"><div class="lock-label">🔒 NO INCLUIDO</div></div>' : ''}
          </div>
          <div class="item-foot">
            <div class="item-link">🔗 ${it.link}</div>
            <button class="btn-copy" onclick="copyLink(this, '${it.link}')">📋 COPIAR LINK LANDING</button>
            ${on ? `<a href="${it.src}" download class="btn-dl">DESCARGAR</a>` : ''}
          </div>
        </div>
      `;
    });
  }

  function copyLink(btn, link) {
    navigator.clipboard.writeText(link).then(() => {
      const txt = btn.textContent;
      btn.textContent = '✅ COPIADO';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = txt; btn.classList.remove('copied'); }, 2000);
    });
  }

  render();
</script>
</body>
</html>
