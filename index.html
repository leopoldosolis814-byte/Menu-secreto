<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Story2Action Reel - Video Ajustado</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000; /* Fondo negro global */
  }

  .scene {
    position: fixed;
    inset: 0;
    opacity: 0;
    transition: opacity 0.7s ease;
    pointer-events: none;
  }

  .scene.active {
    opacity: 1;
    pointer-events: all;
  }

  /* INTRO */
  #intro {
    background: radial-gradient(ellipse at center, #1a1a2e 0%, #080808 70%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 5vh;
  }

  .particles {
    position: absolute;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
  }

  .particle {
    position: absolute;
    border-radius: 50%;
    opacity: 0;
    animation: float linear infinite;
  }

  @keyframes float {
    0%   { transform: translateY(100vh) scale(0); opacity: 0; }
    10%  { opacity: 0.7; }
    90%  { opacity: 0.3; }
    100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
  }

  .logo-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16vw;
    letter-spacing: 2px;
    color: #fff;
    text-align: center;
    line-height: 1;
    opacity: 0;
    transform: scale(0.85);
    transition: opacity 0.9s ease, transform 0.9s ease;
    position: relative;
    z-index: 2;
  }
  .logo-text.vis { opacity: 1; transform: scale(1); }
  .logo-text .two { color: #ff2d78; }

  .intro-divider {
    width: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, #ff2d78, transparent);
    border-radius: 2px;
    transition: width 0.9s ease;
    position: relative;
    z-index: 2;
  }
  .intro-divider.vis { width: 70vw; }

  .intro-tagline {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 5.5vw;
    letter-spacing: 5px;
    color: rgba(255,255,255,0);
    text-align: center;
    transition: color 0.9s ease;
    position: relative;
    z-index: 2;
  }
  .intro-tagline.vis { color: rgba(255,255,255,0.65); }
  .intro-tagline span { color: #ff2d78; }

  /* STORY - SECCIÓN MODIFICADA */
  #story { 
    background: #000; /* Fondo negro para rellenar el hueco superior */
    overflow: hidden; /* Asegura que el video no se salga si lo movemos */
  }

  #story video {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    /* CAMBIO 1: object-fit cover para que llene y podamos moverlo */
    object-fit: cover; 
    z-index: 1;
    /* CAMBIO 2: Desplazamos el video hacia abajo un 10% de la altura */
    transform: translateY(10%); 
  }

  .ig-top {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    z-index: 10;
    padding: 1.5vh 4vw 0;
    /* Gradiente ajustado para el fondo negro superior */
    background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.5) 60%, transparent 100%);
  }

  .ig-progress-bar {
    width: 100%;
    height: 2px;
    background: rgba(255,255,255,0.3);
    border-radius: 2px;
    margin-bottom: 1vh;
    overflow: hidden;
  }

  .ig-progress-fill {
    height: 100%;
    width: 0%;
    background: #fff;
    border-radius: 2px;
  }

  .ig-user-row {
    display: flex;
    align-items: center;
    gap: 2vw;
    padding-bottom: 1vh;
  }

  .ig-avatar {
    width: 8vw;
    height: 8vw;
    border-radius: 50%;
    background: linear-gradient(135deg, #ff2d78, #ffe600);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.8vw;
    color: #fff;
    flex-shrink: 0;
    border: 2px solid #fff;
  }

  .ig-user-info { flex: 1; }

  .ig-username {
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 3vw;
    color: #fff;
    text-shadow: 0 1px 4px rgba(0,0,0,0.6);
  }

  .ig-time {
    font-size: 2.5vw;
    color: rgba(255,255,255,0.65);
    font-weight: 700;
  }

  .ig-icons {
    display: flex;
    gap: 4vw;
    font-size: 4.5vw;
    color: #fff;
  }

  .ig-sticker {
    position: absolute;
    bottom: 12vh; /* Subido un poco para que no tape el texto inferior del video */
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    opacity: 0;
    transition: opacity 0.6s ease;
  }
  .ig-sticker.vis { opacity: 1; }
  .ig-sticker img {
    width: 70vw;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,0.6));
  }

  .ig-bottom {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 10;
    padding: 0 4vw 1.5vh;
    display: flex;
    align-items: center;
    gap: 3vw;
    background: linear-gradient(to top, rgba(0,0,0,0.55), transparent);
  }

  .ig-reply {
    flex: 1;
    border: 2px solid rgba(255,255,255,0.45);
    border-radius: 50px;
    padding: 1.5vw 4vw;
    font-size: 3vw;
    color: rgba(255,255,255,0.65);
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
  }

  .ig-bottom-icons {
    display: flex;
    gap: 4vw;
    font-size: 6vw;
    color: #fff;
  }

  /* OUTRO */
  #outro {
    background: radial-gradient(ellipse at center, #1a1a2e 0%, #080808 70%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 5vh;
    padding: 8vw;
  }

  .outro-logo-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13vw;
    letter-spacing: 2px;
    color: #fff;
    text-align: center;
    opacity: 0;
    transform: scale(0.9);
    transition: opacity 0.8s ease, transform 0.8s ease;
  }
  .outro-logo-text.vis { opacity: 1; transform: scale(1); }
  .outro-logo-text .two { color: #ff2d78; }

  .outro-divider {
    width: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, #ff2d78, transparent);
    transition: width 0.9s ease 0.3s;
  }
  .outro-divider.vis { width: 70vw; }

  .outro-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14vw;
    line-height: 1.0;
    text-align: center;
    color: #fff;
    opacity: 0;
    transform: translateY(4vh);
    transition: opacity 0.7s ease 0.5s, transform 0.7s ease 0.5s;
  }
  .outro-title.vis { opacity: 1; transform: translateY(0); }
  .outro-title span { color: #ff2d78; }

  .outro-sub {
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 4.5vw;
    color: rgba(255,255,255,0.45);
    text-align: center;
    opacity: 0;
    transition: opacity 0.7s ease 0.9s;
  }
  .outro-sub.vis { opacity: 1; }

  .outro-handle {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 9vw;
    color: #ffe600;
    letter-spacing: 3px;
    opacity: 0;
    transition: opacity 0.7s ease 1.3s;
  }
  .outro-handle.vis {
    opacity: 1;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }
</style>
</head>
<body>

<div class="scene active" id="intro">
  <div class="particles" id="particles"></div>
  <div class="logo-text" id="iLogo">STORY<span class="two">2</span>ACTION</div>
  <div class="intro-divider" id="iLine"></div>
  <div class="intro-tagline" id="iTag">Historia con <span>video gancho</span></div>
</div>

<div class="scene" id="story">
  <video id="vid" muted playsinline>
    <source src="https://res.cloudinary.com/ds2udm1nc/video/upload/v1775179566/XRecorder_20260402_02_3_msikcz.mp4" type="video/mp4">
  </video>
  <div class="ig-top">
    <div class="ig-progress-bar">
      <div class="ig-progress-fill" id="pgFill"></div>
    </div>
    <div class="ig-user-row">
      <div class="ig-avatar">S2A</div>
      <div class="ig-user-info">
        <div class="ig-username">story2action</div>
        <div class="ig-time">Ahora</div>
      </div>
      <div class="ig-icons"><span>⋯</span><span>✕</span></div>
    </div>
  </div>
  <div class="ig-sticker" id="sticker">
    <img src="https://res.cloudinary.com/ds2udm1nc/image/upload/v1775179595/Copilot_20260402_221507_zmzti1.png" alt="sticker">
  </div>
  <div class="ig-bottom">
    <div class="ig-reply">Enviar mensaje...</div>
    <div class="ig-bottom-icons"><span>🤍</span><span>➦</span></div>
  </div>
</div>

<div class="scene" id="outro">
  <div class="outro-logo-text" id="oLogo">STORY<span class="two">2</span>ACTION</div>
  <div class="outro-divider" id="oLine"></div>
  <div class="outro-title" id="oTitle">¿Querés esto<br>para tu <span>negocio?</span></div>
  <div class="outro-sub" id="oSub">Convertimos tus stories en ventas</div>
  <div class="outro-handle" id="oHandle">@story2action</div>
</div>

<script>
  const VIDEO_DURATION = 15;

  const pc = document.getElementById('particles');
  for (let i = 0; i < 20; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 5 + 2;
    p.style.cssText = `
      left: ${Math.random()*100}%;
      width: ${size}px;
      height: ${size}px;
      background: ${Math.random()>0.5?'#ff2d78':'#ffe600'};
      animation-duration: ${Math.random()*6+5}s;
      animation-delay: ${Math.random()*5}s;
    `;
    pc.appendChild(p);
  }

  function show(id) {
    document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function vis(id) { document.getElementById(id).classList.add('vis'); }

  function runIntro() {
    show('intro');
    setTimeout(() => vis('iLogo'), 300);
    setTimeout(() => vis('iLine'), 700);
    setTimeout(() => vis('iTag'), 1100);
    setTimeout(runStory, 3800);
  }

  function runStory() {
    show('story');
    const vid = document.getElementById('vid');
    const fill = document.getElementById('pgFill');
    let done = false;

    vid.play();
    vid.addEventListener('timeupdate', () => {
      if (vid.duration) {
         fill.style.width = Math.min((vid.currentTime/vid.duration)*100, 100) + '%';
      }
    });

    setTimeout(() => vis('sticker'), 5000);

    function goOutro() {
      if (done) return;
      done = true;
      runOutro();
    }


    vid.addEventListener('ended', goOutro);
    // Backup por seguridad si el evento ended falla
    setTimeout(goOutro, (VIDEO_DURATION + 1) * 1000);
  }

  function runOutro() {
    show('outro');
    setTimeout(() => vis('oLogo'), 200);
    setTimeout(() => vis('oLine'), 400);
    setTimeout(() => vis('oTitle'), 600);
    setTimeout(() => vis('oSub'), 1000);
    setTimeout(() => vis('oHandle'), 1400);
  }

  runIntro();
</script>
</body>
</html>
