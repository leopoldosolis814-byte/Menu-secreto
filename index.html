<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Story2Action Reel</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    background: #000;
    font-family: 'Nunito', sans-serif;
  }

  /* ── ESCENAS ── */
  .scene {
    position: absolute;
    inset: 0;
    width: 1080px;
    height: 1920px;
    opacity: 0;
    transition: opacity 0.6s ease;
    pointer-events: none;
  }

  .scene.active {
    opacity: 1;
    pointer-events: all;
  }

  /* ══════════════════════════
     INTRO
  ══════════════════════════ */
  #intro {
    background: #080808;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 40px;
  }

  .intro-logo {
    width: 480px;
    opacity: 0;
    transform: scale(0.85);
    transition: opacity 0.8s ease, transform 0.8s ease;
  }

  .intro-logo.visible {
    opacity: 1;
    transform: scale(1);
  }

  .intro-line {
    width: 0;
    height: 3px;
    background: #ff2d78;
    transition: width 0.8s ease 0.5s;
  }

  .intro-line.visible { width: 480px; }

  .intro-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 52px;
    letter-spacing: 6px;
    color: rgba(255,255,255,0.0);
    text-align: center;
    transition: color 0.8s ease 0.9s;
  }

  .intro-text.visible { color: rgba(255,255,255,0.7); }

  .intro-text span { color: #ff2d78; }

  /* ══════════════════════════
     STORY SIMULADA
  ══════════════════════════ */
  #story {
    background: #000;
  }

  #story video {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 1;
  }

  /* Marco iPhone simulado */
  .phone-frame {
    position: absolute;
    inset: 0;
    z-index: 5;
    pointer-events: none;
  }

  /* Barra superior Instagram */
  .ig-top {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    z-index: 10;
    padding: 32px 36px 20px;
    display: flex;
    align-items: center;
    gap: 18px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
  }

  .ig-progress {
    flex: 1;
    height: 3px;
    background: rgba(255,255,255,0.3);
    border-radius: 2px;
    overflow: hidden;
  }

  .ig-progress-fill {
    height: 100%;
    background: #fff;
    width: 0%;
    transition: width linear;
  }

  .ig-avatar {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: linear-gradient(135deg, #ff2d78, #ffe600);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: #fff;
    flex-shrink: 0;
  }

  .ig-username {
    font-size: 32px;
    font-weight: 900;
    color: #fff;
    text-shadow: 0 1px 4px rgba(0,0,0,0.5);
  }

  .ig-time {
    font-size: 24px;
    color: rgba(255,255,255,0.7);
    margin-left: auto;
  }

  /* Sticker de enlace */
  .ig-sticker {
    position: absolute;
    bottom: 380px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    opacity: 0;
    transition: opacity 0.5s ease;
  }

  .ig-sticker.visible { opacity: 1; }

  .ig-sticker img {
    width: 520px;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4));
  }

  /* ══════════════════════════
     OUTRO
  ══════════════════════════ */
  #outro {
    background: #080808;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 48px;
    padding: 80px;
  }

  .outro-logo {
    width: 360px;
    opacity: 0;
    transition: opacity 0.8s ease;
  }

  .outro-logo.visible { opacity: 1; }

  .outro-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 86px;
    line-height: 1.0;
    text-align: center;
    color: #fff;
    letter-spacing: 2px;
    opacity: 0;
    transform: translateY(24px);
    transition: opacity 0.7s ease 0.3s, transform 0.7s ease 0.3s;
  }

  .outro-title.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .outro-title span { color: #ff2d78; }

  .outro-sub {
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 44px;
    color: rgba(255,255,255,0.55);
    text-align: center;
    opacity: 0;
    transition: opacity 0.7s ease 0.7s;
  }

  .outro-sub.visible { opacity: 1; }

  .outro-handle {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 56px;
    color: #ffe600;
    letter-spacing: 3px;
    opacity: 0;
    transition: opacity 0.7s ease 1.1s;
    animation: none;
  }

  .outro-handle.visible {
    opacity: 1;
    animation: pulse 2s ease-in-out infinite;
  }

  .outro-line {
    width: 0;
    height: 3px;
    background: #ff2d78;
    transition: width 0.8s ease 0.2s;
  }

  .outro-line.visible { width: 400px; }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50%       { transform: scale(1.04); }
  }
</style>
</head>
<body>

  <!-- INTRO -->
  <div class="scene active" id="intro">
    <img class="intro-logo" id="introLogo" src="https://res.cloudinary.com/ds2udm1nc/image/upload/v1775179729/Copilot_20260320_213406_ex6t59.png" alt="Story2Action">
    <div class="intro-line" id="introLine"></div>
    <div class="intro-text" id="introText">Historia con <span>video gancho</span></div>
  </div>

  <!-- STORY SIMULADA -->
  <div class="scene" id="story">
    <video id="storyVid" muted playsinline>
      <source src="https://res.cloudinary.com/ds2udm1nc/video/upload/v1775179566/XRecorder_20260402_02_3_msikcz.mp4" type="video/mp4">
    </video>

    <div class="ig-top">
      <div class="ig-progress">
        <div class="ig-progress-fill" id="progressFill"></div>
      </div>
      <div class="ig-avatar">S2A</div>
      <div class="ig-username">story2action</div>
      <div class="ig-time">Ahora</div>
    </div>

    <div class="ig-sticker" id="sticker">
      <img src="https://res.cloudinary.com/ds2udm1nc/image/upload/v1775179595/Copilot_20260402_221507_zmzti1.png" alt="sticker enlace">
    </div>
  </div>

  <!-- OUTRO -->
  <div class="scene" id="outro">
    <img class="outro-logo" id="outroLogo" src="https://res.cloudinary.com/ds2udm1nc/image/upload/v1775179729/Copilot_20260320_213406_ex6t59.png" alt="Story2Action">
    <div class="outro-line" id="outroLine"></div>
    <div class="outro-title" id="outroTitle">¿Querés esto<br>para tu <span>negocio?</span></div>
    <div class="outro-sub" id="outroSub">Convertimos tus stories en ventas</div>
    <div class="outro-handle" id="outroHandle">@story2action</div>
  </div>

<script>
  // ── INTRO ──
  function playIntro() {
    document.getElementById('intro').classList.add('active');
    setTimeout(() => document.getElementById('introLogo').classList.add('visible'), 200);
    setTimeout(() => document.getElementById('introLine').classList.add('visible'), 500);
    setTimeout(() => document.getElementById('introText').classList.add('visible'), 900);
    setTimeout(() => transitionTo('story'), 3200);
  }

  // ── STORY ──
  function playStory() {
    const vid = document.getElementById('storyVid');
    const fill = document.getElementById('progressFill');
    const sticker = document.getElementById('sticker');

    vid.play();

    // Barra de progreso sincronizada con el video
    vid.addEventListener('timeupdate', () => {
      const pct = (vid.currentTime / vid.duration) * 100;
      fill.style.width = pct + '%';
      fill.style.transitionDuration = '0.2s';
    });

    // Sticker aparece a los 3 segundos
    setTimeout(() => sticker.classList.add('visible'), 3000);

    // Ir al outro cuando termina el video
    vid.addEventListener('ended', () => {
      transitionTo('outro');
    });
  }

  // ── OUTRO ──
  function playOutro() {
    setTimeout(() => document.getElementById('outroLogo').classList.add('visible'), 200);
    setTimeout(() => document.getElementById('outroLine').classList.add('visible'), 400);
    setTimeout(() => document.getElementById('outroTitle').classList.add('visible'), 600);
    setTimeout(() => document.getElementById('outroSub').classList.add('visible'), 1000);
    setTimeout(() => document.getElementById('outroHandle').classList.add('visible'), 1400);
  }

  // ── TRANSICIÓN ──
  function transitionTo(sceneId) {
    document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
    const next = document.getElementById(sceneId);
    next.classList.add('active');
    if (sceneId === 'story') playStory();
    if (sceneId === 'outro') playOutro();
  }

  // Arrancar
  playIntro();
</script>

</body>
</html>
