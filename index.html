<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CONTENEDOR */
.container {
    position: relative;
    width: 90vw;
    max-width: 500px;
}

/* IMAGEN */
img {
    width: 100%;
    display: block;
    position: relative;
    z-index: 2;
}

/* PORTAL */
.portal {
    position: absolute;
    top: 26%;
    left: 18%;
    width: 36%;
    height: 34%;
    border-radius: 50%;
    z-index: 3;

    /* EFECTO */
    background: radial-gradient(circle at center, #b6ff2e, #00ff88 60%, transparent 70%);
    box-shadow: 
        0 0 20px #00ff88,
        0 0 40px #00ff88,
        0 0 80px #00ff88;

    animation: spin 3s linear infinite;
}

/* ANIMACIÓN */
@keyframes spin {
    from { transform: rotate(0deg) scale(1); }
    to { transform: rotate(360deg) scale(1.05); }
}

/* EFECTO INTERNO (ondas) */
.portal::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: repeating-radial-gradient(
        circle,
        rgba(0,255,120,0.8) 0px,
        rgba(0,255,120,0.8) 4px,
        transparent 6px,
        transparent 12px
    );
    animation: spinReverse 4s linear infinite;
}

/* GIRO INVERSO */
@keyframes spinReverse {
    from { transform: rotate(360deg); }
    to { transform: rotate(0deg); }
}
</style>
</head>

<body>

<div class="container">
    <div class="portal"></div>
    <img src="fondo.png">
</div>

</body>
</html>
