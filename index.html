<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S2A Studio — Dashboard Activo</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root { --bg: #07070f; --bg2: #0e0e1a; --fucsia: #ff2d78; --amarillo: #ffe600; --blanco: #ffffff; --gris: #666680; --gris2: #333345; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--blanco); font-family: 'Nunito', sans-serif; min-height: 100vh; padding-bottom: 80px; }

  /* HEADER & HERO */
  header { position: sticky; top: 0; z-index: 100; background: rgba(7,7,15,0.95); backdrop-filter: blur(16px); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(255,45,120,0.15); }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 4px; }
  .logo em { color: var(--fucsia); font-style: normal; }
  .hero { position: relative; padding: 60px 28px; text-align: center; }
  .hero-title { font-family: 'Bebas Neue', sans-serif; font-size: 58px; line-height: 0.95; margin-bottom: 10px; }
  .hero-title span { color: var(--amarillo); }
  .hero-line { width: 60px; height: 2px; background: var(--fucsia); margin: 20px auto; }

  /* SECCIONES ACORDEÓN */
  .section { border-top: 1px solid rgba(255,255,255,0.04); }
  .section-header { display: flex; align-items: center; justify-content: space-between; padding: 22px 24px; cursor: pointer; }
  .section-title { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 3px; }
  .chevron { transition: 0.3s; color: var(--fucsia); }
  .section.open .chevron { transform: rotate(180deg); }
  .section-body { display: none; padding: 0 16px 28px; }
  .section.open .section-body { display: block; }

  /* GRID Y CARDS */
  .content-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .item { background: var(--bg2); border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
  .item.activa { border-color: rgba(255,45,120,0.4); }
  .thumb-wrap { position: relative; aspect-ratio: 9/16; background: #000; overflow: hidden; }
  .thumb { width: 100%; height: 100%; object-fit: cover; opacity: 0.2; filter: blur(4px); transition: 0.3s; }
  .item.activa .thumb { opacity: 1; filter: none; }
  .lock-layer { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .lock-label { font-family: 'Bebas Neue', sans-serif; font-size: 10px; color: var(--fucsia); letter-spacing: 2px; }

  /* BOTONES MÁGICOS */
  .item-foot { padding: 12px; display: flex; flex-direction: column; gap: 8px; }
  .btn-prep { background: var(--fucsia); color: white; font-family: 'Bebas Neue'; padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; letter-spacing: 1px; }
  .btn-ig { display: none; background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); color: white; font-family: 'Bebas Neue'; text-align: center; text-decoration: none; padding: 10px; border-radius: 6px; font-size: 14px; }
  .btn-cal { background: transparent; color: var(--amarillo); border: 1px solid var(--amarillo); font-family: 'Bebas Neue'; padding: 6px; border-radius: 6px; font-size: 11px; cursor: pointer; opacity: 0.7; }
</style>
</head>
<body>

<header><div class="logo">STORY<em>2</em>ACTION</div></header>

<div class="hero">
  <div class="hero-title">TU CONTENIDO<br><span id="nombre-local">DE MARZO</span></div>
  <div class="hero-line"></div>
  <p style="font-size:12px; color:var(--gris);">Copiá, agendá y publicá sin descargar nada.</p>
</div>

<div class="section open" id="s-img">
  <div class="section-header" onclick="tog('s-img')"><div class="section-title">IMÁGENES <em>GANCHO</em></div><div class="chevron">▼</div></div>
  <div class="section-body"><div class="content-grid" id="gImg"></div></div>
</div>

<div class="section" id="s-pasos">
  <div class="section-header" onclick="tog('s-pasos')"><div class="section-title">CÓMO <em>PUBLICAR</em></div><div class="chevron">▼</div></div>
  <div class="section-body" style="font-size:13px; color:var(--gris); line-height:1.6;">
    <p>1. Tocá <strong>PREPARAR</strong> para copiar la foto y el link.<br>
    2. Tocá <strong>ABRIR INSTAGRAM</strong>.<br>
    3. Mantené apretado en la historia y dale a <strong>PEGAR</strong>.</p>
  </div>
</div>

<div style="text-align:center; margin-top:30px;">
  <a href="https://wa.me/TUNUMERO" style="color:var(--fucsia); text-decoration:none; font-family:'Bebas Neue'; letter-spacing:2px;">🆘 ¿NECESITÁS AYUDA?</a>
</div>

<footer>STORY<em>2</em>ACTION · 2026</footer>

<script>
  // CONFIGURACIÓN DE IMÁGENES (Mantené tus IDs y Links)
  const IMGS = [
    { id:1, src:"https://res.cloudinary.com/ds2udm1nc/image/upload/v1775263235/Gemini_Generated_Image_bruchsbruchsbruc_etzmgj.png", link:"pepin.com/oferta1", frase:"¡No te lo pierdas! 🔥" },
    { id:2, src:"https://res.cloudinary.com/ds2udm1nc/image/upload/v1775263237/Gemini_Generated_Image_ehiim7ehiim7ehii_i5crwt.png", link:"pepin.com/oferta2", frase:"¡Mirá esta promo! 🍔" },
    { id:3, src:"https://res.cloudinary.com/ds2udm1nc/image/upload/v1775263237/Gemini_Generated_Image_sbvguqsbvguqsbvg_vjubkz.png", link:"pepin.com/oferta3", frase:"¡Vení hoy mismo! 🍕" }
    // Podés seguir agregando hasta la 12...
  ];

  const params = new URLSearchParams(window.location.search);
  const localName = params.get('n');
  const activas = new Set((params.get('a') || "").split(',').map(Number));

  async function prepararTodo(id, url, link, frase) {
    try {
      // 1. COPIAR LINK
      await navigator.clipboard.writeText(link);
      
      // 2. COPIAR IMAGEN (Navegadores modernos)
      const data = await fetch(url);
      const blob = await data.blob();
      await navigator.clipboard.write([ new ClipboardItem({ [blob.type]: blob }) ]);

      // 3. MOSTRAR SIGUIENTE PASO
      document.getElementById(`ig-${id}`).style.display = 'block';
      alert("✅ ¡LISTO!\n\n1. Foto copiada.\n2. Link del sticker copiado.\n\nFrase para el sticker:\n\"" + frase + "\"");
    } catch (err) {
      alert("Tu celular no permite copiado automático. Por favor, descargá la imagen manualmente.");
    }
  }

  function agendar(frase, link) {
    const titulo = encodeURIComponent("🚀 Publicar Historia: " + frase);
    const desc = encodeURIComponent("Link para el sticker de Instagram: " + link);
    const url = `https://www.google.com/calendar/render?action=TEMPLATE&text=${titulo}&details=${desc}`;
    window.open(url, '_blank');
  }

  function makeItem(it) {
    const on = activas.has(it.id);
    return `
      <div class="item ${on ? 'activa' : ''}">
        <div class="thumb-wrap">
          <img class="thumb" src="${it.src}">
          ${!on ? '<div class="lock-layer"><div class="lock-label">🔒 NO INCLUIDO</div></div>' : ''}
        </div>
        <div class="item-foot">
          ${on ? `
            <button class="btn-prep" onclick="prepararTodo(${it.id}, '${it.src}', '${it.link}', '${it.frase}')">⚡ 1. PREPARAR</button>
            <a href="https://www.instagram.com/reels/create/" target="_blank" class="btn-ig" id="ig-${it.id}">📸 2. ABRIR INSTAGRAM</a>
            <button class="btn-cal" onclick="agendar('${it.frase}', '${it.link}')">📅 AGENDAR PARA DESPUÉS</button>` 
          : '<div style="text-align:center; font-size:10px; color:#333;">BLOQUEADO</div>'}
        </div>
      </div>`;
  }

  function render() {
    if(localName) document.getElementById('nombre-local').innerText = localName.toUpperCase();
    const gI = document.getElementById('gImg');
    IMGS.forEach(i => gI.innerHTML += makeItem(i));
  }

  function tog(id) { document.getElementById(id).classList.toggle('open'); }
  render();
</script>
</body>
</html>
