<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Einstein Portal Test</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #111; /* Fondo gris oscuro para ver si algo falla */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .canvas-container {
            position: relative;
            width: 90vw; 
            height: 90vh;
            max-width: 600px; /* Limitamos el ancho para que no se deforme */
            border: 1px solid #333; /* Guía visual */
        }

        .background-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            position: relative;
            z-index: 2;
        }

        .portal-fx {
            position: absolute;
            z-index: 1;
            /* Estos valores deberían ubicarlo en el hueco */
            top: 20%; 
            left: 23%;
            width: 31%;
            height: 26%;
            border-radius: 50%;
            background: radial-gradient(circle, #affd1a, #27ae60);
            filter: blur(5px);
            box-shadow: 0 0 30px #affd1a;
            animation: girar 4s linear infinite;
        }

        @keyframes girar {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="canvas-container">
        <div class="portal-fx"></div>
        <img src="Gemini_Generated_Image_nhjh4lnhjh4lnhjh.png" 
             alt="Error: No se encuentra la imagen" 
             class="background-img"
             onerror="this.style.border='5px solid red'">
    </div>

</body>
</html>
