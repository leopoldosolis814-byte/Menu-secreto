<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Story Burger Diablo</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Oswald:wght@700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    background: #000;
  }

  .scene {
    position: relative;
    width: 1080px;
    height: 1920px;
  }

  video {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 1;
  }

  .overlay {
    position: absolute;
    inset: 0;
    z-index: 2;
    background: linear-gradient(
      to bottom,
      rgba(0,0,0,0.72) 0%,
      rgba(0,0,0,0.15) 45%,
      rgba(0,0,0,0.15) 65%,
      rgba(0,0,0,0.75) 100%
    );
  }

  /* ── TITULAR ── */
  .top-text {
    position: absolute;
    top: 60px;
    left: 0;
    right: 0;
    z-index: 10;
    text-align: center;
    padding: 0 70px;
  }

  .line {
    display: block;
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: 72px;
    line-height: 1.1;
    color: #f5dfa0;
    text-shadow:
      3px 3px 0 #5a1a00,
      -1px -1px 0 #5a1a00,
      0 0 20px rgba(255,100,0,0.4),
      0 8px 6px rgba(139,0,0,0.6),
      0 14px 8px rgba(120,0,0,0.4),
      0 20px 10px rgba(100,0,0,0.2);
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.6s ease, transform 0.6s ease;
  }

  .line.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .line-sub {
    display: block;
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    font-size: 52px;
    color: #fff;
    text-shadow: 2px 2px 8px rgba(0,0,0,0.9);
    margin-top: 16px;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.6s ease, transform 0.6s ease;
  }

  .line-sub.visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* ── LOGO ── */
  .logo-badge {
    position: absolute;
    top: 60px;
    right: 60px;
    z-index: 10;
    width: 160px;
    height: 160px;
    border-radius: 50%;
    background: rgba(245,223,160,0.95);
    border: 4px solid #5a1a00;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    opacity: 0;
    transition: opacity 0.6s ease;
  }
  .logo-badge.visible { opacity: 1; }

  .logo-badge span {
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    font-size: 28px;
    color: #5a1a00;
    line-height: 1.2;
  }

  /* ── CTA ── */
  .cta-wrap {
    position: absolute;
    bottom: 320px;
    left: 0;
    right: 0;
    z-index: 10;
    display: flex;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.6s ease;
  }
  .cta-wrap.visible { opacity: 1; }

  .cta {
    background: rgba(245,223,160,0.95);
    border: 3px solid #5a1a00;
    border-radius: 12px;
    padding: 20px 48px;
    display: flex;
    align-items: center;
    gap: 16px;
    animation: pulse 2s ease-in-out infinite;
  }

  .cta-text {
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    font-size: 46px;
    color: #5a1a00;
    letter-spacing: 1px;
  }

  .cta-arrow {
    font-size: 38px;
    color: #5a1a00;
  }

  /* ── KEYFRAMES ── */
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50%       { transform: scale(1.04); }
  }
</style>
</head>
<body>
<div class="scene">

  <video id="vid" autoplay muted loop playsinline>
    <source src="https://raw.githubusercontent.com/leopoldosolis814-byte/Menu-secreto/main/the_devil_chefs_lips_curl_into_a_slow_sinister_grin_corners_of_his_mouth_rise_slightly_tail_curls_a_73vatuyhrwj7huwl80m1_1.mp4" type="video/mp4">
  </video>

  <div class="overlay"></div>

  <div class="top-text">
    <span class="line" id="l1">Dicen que las mejores</span>
    <span class="line" id="l2">burgers las hace el</span>
    <span class="line" id="l3">diablo mismo...</span>
    <span class="line-sub" id="l4">Hoy vino a probarlo</span>
  </div>

  <div class="logo-badge" id="logo">
    <span>AQUÍ<br>LOGO DE TU<br>HAMBURGUESERÍA</span>
  </div>

  <div class="cta-wrap" id="cta">
    <div class="cta">
      <span class="cta-arrow">▼</span>
      <span class="cta-text">Hacé click y probá si es verdad</span>
      <span class="cta-arrow">▼</span>
    </div>
  </div>

</div>

<script>
  const video = document.getElementById('vid');

  function startAnimation() {
    const delays = [0, 600, 1200, 2000];
    const ids = ['l1','l2','l3','l4'];

    ids.forEach((id, i) => {
      setTimeout(() => {
        document.getElementById(id).classList.add('visible');
      }, delays[i]);
    });

    setTimeout(() => {
      document.getElementById('logo').classList.add('visible');
    }, 800);

    setTimeout(() => {
      document.getElementById('cta').classList.add('visible');
    }, 2800);
  }

  video.addEventListener('canplay', startAnimation, { once: true });
  if (video.readyState >= 3) startAnimation();
</script>

</body>
</html>
