<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S2A Studio — Hamburguesería</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #000000;
    --bg2: #0a0a12;
    --fucsia: #ff2d78;
    --amarillo: #ffe600;
    --blanco: #ffffff;
    --gris: #666680;
    --gris2: #1a1a2e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--blanco);
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    padding-bottom: 80px;
  }

  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(0,0,0,0.9);
    backdrop-filter: blur(12px);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid rgba(255,45,120,0.2);
  }

  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 3px; }
  .logo em { color: var(--fucsia); font-style: normal; }

  .hero {
    padding: 60px 24px;
    text-align: center;
    background: radial-gradient(circle at center, rgba(255,45,120,0.1) 0%, transparent 70%);
  }

  .hero-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 50px;
    line-height: 1;
    margin-bottom: 15px;
  }
  .hero-title span { color: var(--amarillo); }

  .section { border-top: 1px solid rgba(255,255,255,0.05); }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 24px;
    cursor: pointer;
  }

  .section-title { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 2px; }
  .section-title em { color: var(--fucsia); font-style: normal; }

  .content-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 16px 24px; }

  .item {
    background: var(--bg2);
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.05);
  }
  .item.activa { border-color: rgba(255,45,120,0.4); box-shadow: 0 4px 20px rgba(255,45,120,0.1); }

  .thumb-wrap { position: relative; aspect-ratio: 9/16; background: #000; }
  .thumb { width: 100%; height: 100%; object-fit: cover; }

  .lock-layer {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.85);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    backdrop-filter: blur(3px);
  }

  .item-foot { padding: 12px; }
  
  .link-label { font-size: 8px; color: var(--gris); text-transform: uppercase; margin-bottom: 4px; letter-spacing: 1px; }

  .btn-copy {
    width: 100%;
    background: var(--gris2);
    color: var(--blanco);
    border: 1px solid rgba(255,255,255,0.1);
    font-family: 'Bebas Neue', sans-serif;
    padding: 8px;
    border-radius: 6px;
    cursor: pointer;
    margin-bottom: 8px;
    font-size: 11px;
  }
  .btn-copy.copied { background: var(--fucsia); border-color: var(--fucsia); }

  .btn-dl {
    display: block; width: 100%;
    background: var(--fucsia);
    color: #fff;
    font-family: 'Bebas Neue', sans-serif;
    text-align: center;
    padding: 10px;
    border-radius: 6px;
    text-decoration: none;
    font-size: 14px;
  }

  .wa-wrap { margin: 20px 16px; padding: 25px; background: var(--bg2); border-radius: 15px; text-align: center; border: 1px solid #25d36633; }
  .btn-wa { background: #25d366; color: #fff; padding: 12px 25px; border-radius: 50px; text-decoration: none; font-family: 'Bebas Neue'; display: inline-block; margin-top: 10px; }

  footer { text-align: center; padding: 30px; font-family: 'Bebas Neue'; color: #333; letter-spacing: 2px; }
</style>
</head>
<body>

<header>
  <div class="logo">STORY<em>2</em>ACTION</div>
  <div class="rubro-tag" style="font-family:'Bebas Neue'; color:var(--fucsia); font-size:12px;">HAMBURGUESERÍA</div>
</header>

<div class="hero">
  <div class="hero-title">PACK DEL MES<br><span>LISTO</span></div>
  <p style="color:var(--gris); font-size:13px;">Contenido estratégico para vender más hoy.</p>
</div>

<div class="section" id="s-img">
  <div class="section-header" onclick="tog('s-img')">
    <div class="section-title">IMÁGENES <em>GANCHO</em></div>
    <div id="cnt-img" style="font-size:10px; color:var(--gris)">TOCÁ PARA VER</div>
  </div>
  <div class="content-grid" id="gImg"></div>
</div>

<div class="section" id="s-vid">
  <div class="section-header" onclick="tog('s-vid')">
    <div class="section-title">VIDEOS <em>GANCHO</em></div>
    <div id="cnt-vid" style="font-size:10px; color:var(--gris)">TOCÁ PARA VER</div>
  </div>
  <div class="content-grid" id="gVid"></div>
</div>

<div class="wa-wrap">
  <div style="font-family:'Bebas Neue'; font-size:20px;">¿NECESITÁS AYUDA?</div>
  <a class="btn-wa" href="https://wa.me/TUNUMERO">💬 HABLAR CON SOPORTE</a>
</div>

<footer>STORY<em>2</em>ACTION · 2026</footer>

<script>
  // CONFIGURACIÓN DE ENLACES:
  // Cambiá "tulocal.com/promo" por el link de WhatsApp o Menú de tu cliente.
  const IMGS = [
    { id:1,  src:"https://res.cloudinary.com/ds2udm1nc/image/upload/v1775263235/Gemini_Generated_Image_bruchsbruchsbruc_etzmgj.png", link:"https://wa.me/tu-link-aqui" },
    { id:2,  src:"https://res.cloudinary.com/ds2udm1nc/image/upload/v1775263237/Gemini_Generated_Image_ehiim7ehiim7ehii_i5crwt.png", link:"https://wa.me/tu-link-aqui" },
    { id:3,  src:"https://res.cloudinary.com/ds2udm1nc/image/upload/v1775263237/Gemini_Generated_Image_sbvguqsbvguqsbvg_vjubkz.png", link:"https://wa.me/tu-link-aqui" },
    { id:4,  src:"https://res.cloudinary.com/ds2udm1nc/image/upload/v1775263238/Copilot_20260315_233635_sbtrat.png", link:"https://wa.me/tu-link-aqui" },
    { id:5,  src:"https://res.cloudinary.com/ds2udm1nc/image/upload/v1775263716/Copilot_20260314_071451_przxv4.png", link:"https://wa.me/tu-link-aqui" },
    { id:6,  src:"https://res.cloudinary.com/ds2udm1nc/image/upload/v1775263716/Copilot_20260314_071211_qm7jab.png", link:"https://wa.me/tu-link-aqui" },
    { id:7,  src:"https://res.cloudinary.com/ds2udm1nc/image/upload/v1775263717/Gemini_Generated_Image_ogy5k5ogy5k5ogy5_aycznb.png", link:"https://wa.me/tu-link-aqui" },
    { id:8,  src:"https://res.cloudinary.com/ds2udm1nc/image/upload/v1775263718/Gemini_Generated_Image_ducsgqducsgqducs_es4g86.png", link:"https://wa.me/tu-link-aqui" },
    { id:9,  src:"https://res.cloudinary.com/ds2udm1nc/image/upload/v1775263718/Copilot_20260314_065249_x97xrh.png", link:"https://wa.me/tu-link-aqui" },
    { id:10, src:"https://res.cloudinary.com/ds2udm1nc/image/upload/v1775264237/Copilot_20260403_215554_do60bt.png", link:"https://wa.me/tu-link-aqui" },
    { id:11, src:"https://res.cloudinary.com/ds2udm1nc/image/upload/v1775264267/Gemini_Generated_Image_ducsgqducsgqducs_tshxtu.png", link:"https://wa.me/tu-link-aqui" },
    { id:12, src:"https://res.cloudinary.com/ds2udm1nc/image/upload/v1775264370/Copilot_20260314_081306_boln31.png", link:"https://wa.me/tu-link-aqui" },
  ];

  const VIDS = [
    { id:13, src:null, link:"https://wa.me/tu-link-aqui" },
    { id:14, src:null, link:"https://wa.me/tu-link-aqui" },
    { id:15, src:null, link:"https://wa.me/tu-link-aqui" },
    { id:16, src:null, link:"https://wa.me/tu-link-aqui" },
  ];

  const activas = new Set((new URLSearchParams(window.location.search).get('activas') || '').split(',').map(Number));

  function makeItem(it, isVid) {
    const on = activas.has(it.id);
    const label = (isVid ? 'VIDEO ' : 'IMAGE ') + it.id;
    const media = it.src ? (isVid ? `<video class="thumb" src="${it.src}" muted></video>` : `<img class="thumb" src="${it.src}">`) : `<div style="height:100%; display:flex; align-items:center; justify-content:center; color:#222; font-family:'Bebas Neue'">PRÓXIMAMENTE</div>`;
    
    return `
      <div class="item ${on ? 'activa' : ''}">
        <div class="thumb-wrap">
          ${media}
          ${!on ? '<div class="lock-layer"><span style="font-size:24px">🔒</span><span style="font-family:\'Bebas Neue\'; color:var(--fucsia); font-size:10px; margin-top:5px;">BLOQUEADO</span></div>' : ''}
        </div>
        <div class="item-foot">
          ${on ? `<div class="link-label">Link para Sticker:</div><button class="btn-copy" onclick="copyLink(this, '${it.link}')">🔗 COPIAR ENLACE</button><a href="${it.src}" download class="btn-dl">DESCARGAR</a>` : `<div style="text-align:center; color:var(--gris); font-size:10px;">No disponible</div>`}
        </div>
      </div>`;
  }

  function render() {
    IMGS.forEach(i => document.getElementById('gImg').innerHTML += makeItem(i, false));
    VIDS.forEach(v => document.getElementById('gVid').innerHTML += makeItem(v, true));
  }

  function copyLink(btn, link) {
    navigator.clipboard.writeText(link).then(() => {
      const old = btn.textContent;
      btn.textContent = '✅ COPIADO';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = old; btn.classList.remove('copied'); }, 2000);
    });
  }

  function tog(id) { const el = document.getElementById(id); el.style.display = el.style.display === 'none' ? 'block' : 'none'; }
  render();
</script>
</body>
</html>
