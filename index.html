<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Story2Action Reel</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    background: #000;
  }

  .scene {
    position: absolute;
    inset: 0;
    width: 1080px;
    height: 1920px;
    opacity: 0;
    transition: opacity 0.7s ease;
    pointer-events: none;
  }

  .scene.active {
    opacity: 1;
    pointer-events: all;
  }

  /* ══════════════════════════
     INTRO
  ══════════════════════════ */
  #intro {
    background: #080808;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 60px;
  }

  .intro-logo {
    width: 780px;
    opacity: 0;
    transform: scale(0.88);
    transition: opacity 0.9s ease, transform 0.9s ease;
  }
  .intro-logo.vis { opacity: 1; transform: scale(1); }

  .intro-line {
    width: 0;
    height: 4px;
    background: #ff2d78;
    border-radius: 2px;
    transition: width 0.8s ease;
  }
  .intro-line.vis { width: 700px; }

  .intro-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 72px;
    letter-spacing: 8px;
    color: rgba(255,255,255,0);
    text-align: center;
    transition: color 0.8s ease;
  }
  .intro-label.vis { color: rgba(255,255,255,0.75); }
  .intro-label span { color: #ff2d78; }

  /* ══════════════════════════
     STORY SIMULADA
  ══════════════════════════ */
  #story { background: #000; }

  #story video {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 1;
  }

  /* Barra superior Instagram */
  .ig-top {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    z-index: 10;
    padding: 30px 30px 0;
    background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, transparent 100%);
  }

  /* Barra de progreso */
  .ig-progress-bar {
    width: 100%;
    height: 4px;
    background: rgba(255,255,255,0.3);
    border-radius: 2px;
    margin-bottom: 20px;
    overflow: hidden;
  }

  .ig-progress-fill {
    height: 100%;
    width: 0%;
    background: #fff;
    border-radius: 2px;
  }

  /* Info usuario */
  .ig-user-row {
    display: flex;
    align-items: center;
    gap: 18px;
    padding-bottom: 16px;
  }

  .ig-avatar {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: linear-gradient(135deg, #ff2d78, #ffe600);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    color: #fff;
    flex-shrink: 0;
    border: 3px solid #fff;
  }

  .ig-user-info { flex: 1; }

  .ig-username {
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 34px;
    color: #fff;
    text-shadow: 0 1px 4px rgba(0,0,0,0.6);
  }

  .ig-time {
    font-size: 26px;
    color: rgba(255,255,255,0.65);
    font-weight: 700;
  }

  .ig-icons {
    display: flex;
    gap: 20px;
    align-items: center;
  }

  .ig-icon {
    font-size: 44px;
    color: #fff;
    text-shadow: 0 1px 4px rgba(0,0,0,0.5);
  }

  /* Sticker enlace */
  .ig-sticker {
    position: absolute;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    opacity: 0;
    transition: opacity 0.6s ease;
  }
  .ig-sticker.vis { opacity: 1; }

  .ig-sticker img {
    width: 600px;
    filter: drop-shadow(0 4px 16px rgba(0,0,0,0.5));
  }

  /* Barra inferior Instagram */
  .ig-bottom {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 10;
    padding: 0 30px 40px;
    display: flex;
    align-items: center;
    gap: 20px;
    background: linear-gradient(to top, rgba(0,0,0,0.5) 0%, transparent 100%);
  }

  .ig-reply {
    flex: 1;
    border: 2px solid rgba(255,255,255,0.5);
    border-radius: 50px;
    padding: 18px 30px;
    font-size: 28px;
    color: rgba(255,255,255,0.7);
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
  }

  .ig-bottom-icons {
    display: flex;
    gap: 24px;
    align-items: center;
  }

  .ig-bottom-icon {
    font-size: 52px;
    color: #fff;
  }

  /* ══════════════════════════
     OUTRO
  ══════════════════════════ */
  #outro {
    background: #080808;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 56px;
    padding: 80px;
  }

  .outro-logo {
    width: 680px;
    opacity: 0;
    transition: opacity 0.8s ease;
  }
  .outro-logo.vis { opacity: 1; }

  .outro-line {
    width: 0;
    height: 4px;
    background: #ff2d78;
    border-radius: 2px;
    transition: width 0.8s ease 0.3s;
  }
  .outro-line.vis { width: 600px; }

  .outro-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 110px;
    line-height: 1.0;
    text-align: center;
    color: #fff;
    letter-spacing: 2px;
    opacity: 0;
    transform: translateY(28px);
    transition: opacity 0.7s ease 0.5s, transform 0.7s ease 0.5s;
  }
  .outro-title.vis { opacity: 1; transform: translateY(0); }
  .outro-title span { color: #ff2d78; }

  .outro-sub {
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 48px;
    color: rgba(255,255,255,0.5);
    text-align: center;
    opacity: 0;
    transition: opacity 0.7s ease 0.9s;
  }
  .outro-sub.vis { opacity: 1; }

  .outro-handle {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 72px;
    color: #ffe600;
    letter-spacing: 4px;
    opacity: 0;
    transition: opacity 0.7s ease 1.3s;
  }
  .outro-handle.vis {
    opacity: 1;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }
</style>
</head>
<body>

<!-- INTRO -->
<div class="scene active" id="intro">
  <img class="intro-logo" id="iLogo" src="https://res.cloudinary.com/ds2udm1nc/image/upload/v1775179729/Copilot_20260320_213406_ex6t59.png" alt="Logo">
  <div class="intro-line" id="iLine"></div>
  <div class="intro-label" id="iLabel">Historia con <span>video gancho</span></div>
</div>

<!-- STORY -->
<div class="scene" id="story">
  <video id="vid" muted playsinline>
    <source src="https://res.cloudinary.com/ds2udm1nc/video/upload/v1775179566/XRecorder_20260402_02_3_msikcz.mp4" type="video/mp4">
  </video>

  <div class="ig-top">
    <div class="ig-progress-bar">
      <div class="ig-progress-fill" id="pgFill"></div>
    </div>
    <div class="ig-user-row">
      <div class="ig-avatar">S2A</div>
      <div class="ig-user-info">
        <div class="ig-username">story2action</div>
        <div class="ig-time">Ahora</div>
      </div>
      <div class="ig-icons">
        <span class="ig-icon">⋯</span>
        <span class="ig-icon">✕</span>
      </div>
    </div>
  </div>

  <div class="ig-sticker" id="sticker">
    <img src="https://res.cloudinary.com/ds2udm1nc/image/upload/v1775179595/Copilot_20260402_221507_zmzti1.png" alt="sticker">
  </div>

  <div class="ig-bottom">
    <div class="ig-reply">Enviar mensaje...</div>
    <div class="ig-bottom-icons">
      <span class="ig-bottom-icon">🤍</span>
      <span class="ig-bottom-icon">➦</span>
    </div>
  </div>
</div>

<!-- OUTRO -->
<div class="scene" id="outro">
  <img class="outro-logo" id="oLogo" src="https://res.cloudinary.com/ds2udm1nc/image/upload/v1775179729/Copilot_20260320_213406_ex6t59.png" alt="Logo">
  <div class="outro-line" id="oLine"></div>
  <div class="outro-title" id="oTitle">¿Querés esto<br>para tu <span>negocio?</span></div>
  <div class="outro-sub" id="oSub">Convertimos tus stories en ventas</div>
  <div class="outro-handle" id="oHandle">@story2action</div>
</div>

<script>
  const VIDEO_DURATION = 15;

  function show(id) {
    document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function vis(id) {
    document.getElementById(id).classList.add('vis');
  }

  // ── INTRO ──
  function runIntro() {
    show('intro');
    setTimeout(() => vis('iLogo'), 300);
    setTimeout(() => vis('iLine'), 700);
    setTimeout(() => vis('iLabel'), 1100);
    setTimeout(() => runStory(), 3500);
  }

  // ── STORY ──
  function runStory() {
    show('story');
    const vid = document.getElementById('vid');
    const fill = document.getElementById('pgFill');

    vid.play();

    // Progreso sincronizado
    vid.addEventListener('timeupdate', () => {
      const pct = (vid.currentTime / VIDEO_DURATION) * 100;
      fill.style.width = pct + '%';
    });

    // Sticker aparece a los 10 segundos
    setTimeout(() => vis('sticker'), 10000);

    // Al terminar → outro
    vid.addEventListener('ended', () => runOutro());

    // Fallback por si ended no dispara
    setTimeout(() => runOutro(), (VIDEO_DURATION + 1) * 1000);
  }

  // ── OUTRO ──
  function runOutro() {
    show('outro');
    setTimeout(() => vis('oLogo'), 200);
    setTimeout(() => vis('oLine'), 400);
    setTimeout(() => vis('oTitle'), 600);
    setTimeout(() => vis('oSub'), 1000);
    setTimeout(() => vis('oHandle'), 1400);
  }

  // Arrancar
  runIntro();
</script>

</body>
</html>
