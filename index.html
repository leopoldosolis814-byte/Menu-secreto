<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu El Puis</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #000; font-family: 'Arial Black', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: white; }
        
        .container { width: 100vw; max-width: 500px; aspect-ratio: 1 / 1; background-color: #000; position: relative; display: flex; flex-direction: column; overflow: hidden; }

        .bg-img { width: 100%; height: 55%; object-fit: cover; }

        .badge { background-color: #e63946; color: white; padding: 6px 18px; border-radius: 25px; font-weight: bold; font-size: 13px; text-transform: uppercase; z-index: 10; margin-top: -15px; align-self: center; border: 2px solid #000; }

        .content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: space-around; padding: 15px; text-align: center; }

        .logo-area { display: flex; align-items: center; gap: 8px; color: #ffcc00; font-size: 24px; }
        .promo-title { font-size: 26px; letter-spacing: -1px; }
        .price { color: #ffcc00; font-size: 55px; line-height: 1; }

        .btn-ws { background-color: #25d366; color: white; width: 90%; padding: 18px; border-radius: 12px; text-decoration: none; font-weight: bold; font-size: 20px; display: block; text-align: center; }
    </style>
</head>
<body>

    <div class="container">
        <img src="burger.png" alt="Burger" class="bg-img">
        
        <div class="badge">Doble Carne • Doble Cheddar • Con Papas</div>

        <div class="content">
            <div class="logo-area">
                <span style="font-size: 35px;">🍔</span>
                <span>El Puis</span>
            </div>

            <h1 class="promo-title">PROMO DESCUBIERTA</h1>

            <div class="price">$6.000</div>

            <a href="https://wa.me/5493794657659?text=%C2%A1LA%20DESCUBR%C3%8D%21%20Quiero%20la%20Promo%20Inc%C3%B3gnita%21%0ADirecci%C3%B3n%20de%20env%C3%ADo%3A%0AModo%20de%20pago%3A%20efectivo%2Ftransferencia%0AComentarios%20adicionales%3A" class="btn-ws">
                PEDIR POR WHATSAPP
            </a>
        </div>
    </div>

</body>
</html>
