<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InstaFlix Dining - Box Series</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff2d78; /* Fucsia InstaFlix */
            --bg: #0a0a0a;
            --card-bg: #1a1a1a;
            --gold: #d4af37;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: white;
            padding-bottom: 50px;
        }

        /* HEADER */
        header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            position: fixed;
            width: 100%;
            z-index: 100;
            box-sizing: border-box;
        }

        .logo { font-weight: 900; color: var(--primary); letter-spacing: -1px; font-size: 1.2rem; }
        .status { background: var(--gold); color: black; padding: 5px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 900; }

        /* HERO SECTION */
        .hero {
            height: 60vh;
            background: linear-gradient(to top, var(--bg), transparent), url('https://images.unsplash.com/photo-1550745165-9bc0b252726f?auto=format&fit=crop&q=80&w=1000'); /* Imagen Genérica */
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 20px;
        }

        .hero h1 { font-size: 2.5rem; margin: 0; text-transform: uppercase; }
        .hero p { color: #ccc; font-size: 0.9rem; max-width: 300px; margin: 10px 0; }

        /* LISTA DE EPISODIOS */
        .episodes-container { padding: 20px; }
        .section-title { font-size: 1.1rem; margin-bottom: 15px; color: #666; text-transform: uppercase; letter-spacing: 2px; }

        .episode-card {
            background: var(--card-bg);
            border-radius: 10px;
            margin-bottom: 15px;
            overflow: hidden;
            display: flex;
            position: relative;
            border: 1px solid #333;
        }

        .episode-thumb {
            width: 120px;
            height: 80px;
            background-size: cover;
            background-position: center;
            filter: grayscale(1);
            opacity: 0.5;
        }

        .episode-info {
            padding: 10px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .ep-title { font-weight: 900; font-size: 0.9rem; margin-bottom: 5px; }
        .ep-desc { font-size: 0.7rem; color: #888; }

        /* BOTÓN DE DESBLOQUEO */
        .unlock-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            font-weight: 900;
            font-size: 0.7rem;
            cursor: pointer;
            margin-top: 10px;
            width: fit-content;
        }

        /* ESTADO DESBLOQUEADO */
        .episode-card.unlocked .episode-thumb { filter: grayscale(0); opacity: 1; }
        .episode-card.unlocked { border-color: var(--primary); }
        .episode-card.unlocked .unlock-btn { background: #333; }

        /* ICONO CANDADO */
        .lock-icon {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">INSTAFLIX Originals</div>
        <div class="status" id="creditos">PASE ACTIVO: 3/4</div>
    </header>

    <div class="hero">
        <h1>CÓDIGO 404</h1>
        <p>Un maletín, una traición y el secreto mejor guardado de la ciudad.</p>
    </div>

    <div class="episodes-container">
        <div class="section-title">Temporada 1</div>

        <div class="episode-card unlocked">
            <div class="episode-thumb" style="background-image: url('https://images.unsplash.com/photo-1514539079130-25950c84af65?auto=format&fit=crop&q=80&w=200');"></div>
            <div class="episode-info">
                <div class="ep-title">Capítulo 1: El Remitente</div>
                <div class="ep-desc">Visto hace 2 días.</div>
                <button class="unlock-btn" onclick="alert('Reproduciendo Video...')">VER DE NUEVO</button>
            </div>
            <div class="lock-icon">✅</div>
        </div>

        <div id="ep2" class="episode-card">
            <div class="episode-thumb" style="background-image: url('https://images.unsplash.com/photo-1502472545331-645bb8151302?auto=format&fit=crop&q=80&w=200');"></div>
            <div class="episode-info">
                <div class="ep-title">Capítulo 2: La Sombra</div>
                <div class="ep-desc">Pedí tu burger para desbloquear.</div>
                <button class="unlock-btn" onclick="activarPedido(2)">PEDIR BURGER Y VER</button>
            </div>
            <div class="lock-icon">🔒</div>
        </div>

        <div class="episode-card">
            <div class="episode-thumb" style="background-image: url('https://images.unsplash.com/photo-1536440136628-849c177e76a1?auto=format&fit=crop&q=80&w=200');"></div>
            <div class="episode-info">
                <div class="ep-title">Capítulo 3: Sin Salida</div>
                <div class="ep-desc">Disponible tras completar el Cap 2.</div>
            </div>
            <div class="lock-icon">🔒</div>
        </div>

    </div>

    <script>
        function activarPedido(num) {
            // 1. Simulación de envío de WhatsApp al comercio
            const confirmar = confirm("¿Querés activar tu capítulo y enviar el pedido de tu hamburguesa a la cocina?");
            
            if(confirmar) {
                // Simulamos el link de WhatsApp
                const numeroComercio = "+549123456789";
                const msj = `Hola! Soy el cliente 001. Activo mi CRÉDITO ${num} del Box Cinema. ¡A la cocina!`;
                
                // Abrimos WhatsApp (En una pestaña nueva)
                window.open(`https://wa.me/${numeroComercio}?text=${encodeURIComponent(msj)}`, '_blank');

                // 2. Cambiamos la UI para que parezca desbloqueado
                const card = document.getElementById('ep' + num);
                card.classList.add('unlocked');
                card.querySelector('.unlock-btn').innerText = 'REPRODUCIENDO...';
                card.querySelector('.lock-icon').innerText = '🎬';
                card.querySelector('.ep-desc').innerText = '¡Que disfrutes tu comida y el video!';
                
                // 3. Actualizamos el contador visual
                document.getElementById('creditos').innerText = "PASE ACTIVO: 2/4";
                document.getElementById('creditos').style.background = "#ff2d78";
                document.getElementById('creditos').style.color = "white";
            }
        }
    </script>
</body>
</html>
