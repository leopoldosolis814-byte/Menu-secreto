<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S2A - Tus Historias</title>
    <style>
        :root { --pink: #ff0055; --dark: #0a0a0a; --gray: #1a1a1a; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; text-align: center; }
        .header { margin-bottom: 30px; }
        .header h1 { font-size: 24px; margin: 0; letter-spacing: 2px; }
        .header span { color: var(--pink); }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; max-width: 500px; margin: 0 auto; }
        .card { background: var(--gray); border-radius: 12px; overflow: hidden; position: relative; border: 1px solid #333; }
        .card img { width: 100%; display: block; filter: brightness(0.5); }
        .card.active img { filter: brightness(1); }
        
        /* Candado y Mensaje */
        .lock-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.6); }
        .lock-text { color: var(--pink); font-size: 10px; font-weight: bold; margin-top: 5px; text-transform: uppercase; }

        /* Botones */
        .btn-group { padding: 10px; display: flex; flex-direction: column; gap: 8px; }
        .btn { background: #222; color: #eee; text-decoration: none; font-size: 11px; padding: 8px; border-radius: 6px; border: 1px solid #444; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .btn-link { color: #ffeb3b; border-color: #ffeb3b; }
        
        .active .lock-overlay { display: none; }
    </style>
</head>
<body>

    <div class="header">
        <h1>STORY<span>2</span>ACTION</h1>
        <p id="local-name" style="color:var(--pink); text-transform: uppercase; font-size: 12px; margin-top: 5px;">Cargando...</p>
    </div>

    <div class="grid" id="main-grid">
        <div class="card" id="card1">
            <img src="https://picsum.photos/400/700?random=1" id="img1">
            <div class="lock-overlay"><span style="font-size:20px;">🔒</span><span class="lock-text">No Incluido</span></div>
            <div class="btn-group">
                <a href="#" class="btn" id="dl1">⬇️ DESCARGAR IMAGEN</a>
                <a href="#" class="btn btn-link" id="ln1">🔗 ENLACE DE TU LANDING</a>
            </div>
        </div>
        <div class="card" id="card2">
            <img src="https://picsum.photos/400/700?random=2" id="img2">
            <div class="lock-overlay"><span style="font-size:20px;">🔒</span><span class="lock-text">No Incluido</span></div>
            <div class="btn-group">
                <a href="#" class="btn" id="dl2">⬇️ DESCARGAR IMAGEN</a>
                <a href="#" class="btn btn-link" id="ln2">🔗 ENLACE DE TU LANDING</a>
            </div>
        </div>
        <div class="card" id="card3">
            <img src="https://picsum.photos/400/700?random=3" id="img3">
            <div class="lock-overlay"><span style="font-size:20px;">🔒</span><span class="lock-text">No Incluido</span></div>
            <div class="btn-group">
                <a href="#" class="btn" id="dl3">⬇️ DESCARGAR IMAGEN</a>
                <a href="#" class="btn btn-link" id="ln3">🔗 ENLACE DE TU LANDING</a>
            </div>
        </div>
        <div class="card" id="card4">
            <img src="https://picsum.photos/400/700?random=4" id="img4">
            <div class="lock-overlay"><span style="font-size:20px;">🔒</span><span class="lock-text">No Incluido</span></div>
            <div class="btn-group">
                <a href="#" class="btn" id="dl4">⬇️ DESCARGAR IMAGEN</a>
                <a href="#" class="btn btn-link" id="ln4">🔗 ENLACE DE TU LANDING</a>
            </div>
        </div>
    </div>

    <script>
        // LEER EL LINK INTELIGENTE
        const params = new URLSearchParams(window.location.search);
        const local = params.get('n');
        const idCliente = params.get('id');
        const promoLink = "https://tulocal.com/promo"; // Aquí iría tu link por defecto o dinámico

        if (local) {
            document.getElementById('local-name').innerText = local;
            
            // DESBLOQUEAR TODO
            for(let i=1; i<=4; i++) {
                document.getElementById('card' + i).classList.add('active');
                
                // Configurar descarga (aquí pondrías el link real de la imagen en el futuro)
                document.getElementById('dl' + i).onclick = () => alert('Iniciando descarga de Historia ' + i);
                
                // Configurar enlace de landing
                document.getElementById('ln' + i).href = promoLink;
            }
        } else {
            document.getElementById('local-name').innerText = "Acceso Denegado";
        }
    </script>
</body>
</html>
