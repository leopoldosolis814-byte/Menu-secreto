<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Einstein Portal - GitHub Edition</title>
    <style>
        /* Eliminamos margenes y centramos todo */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Contenedor principal responsivo */
        .canvas-container {
            position: relative;
            height: 95vh; /* Se ajusta al alto de la pantalla */
            aspect-ratio: 2/3; /* Mantiene la proporción de la imagen original */
            max-width: 100%;
        }

        /* La imagen de Einstein */
        .background-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
            position: relative;
            z-index: 2; /* Por encima del portal */
            pointer-events: none; /* Permite clicks a través de ella si es necesario */
        }

        /* El Portal Animado */
        .portal-fx {
            position: absolute;
            z-index: 1;
            
            /* Coordenadas precisas para el hueco de la pared */
            top: 19.5%; 
            left: 23.5%;
            width: 30.5%;
            height: 25.5%;
            
            border-radius: 50%;
            background: radial-gradient(circle, #affd1a 20%, #27ae60 70%, #0d3b1e 100%);
            
            /* Efecto de distorsión y brillo */
            filter: url(#portal-noise) blur(4px);
            box-shadow: 0 0 40px #affd1a, inset 0 0 20px #000;
            
            animation: rotatePortal 5s linear infinite;
        }

        @keyframes rotatePortal {
            from { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.05); }
            to { transform: rotate(360deg) scale(1); }
        }
    </style>
</head>
<body>

    <div class="canvas-container">
        <div class="portal-fx"></div>
        
        <img src="Gemini_Generated_Image_nhjh4lnhjh4lnhjh.png" class="background-img">
    </div>

    <svg style="display: none;">
        <filter id="portal-noise">
            <feTurbulence type="fractalNoise" baseFrequency="0.015" numOctaves="3" seed="5">
                <animate attributeName="baseFrequency" dur="15s" values="0.015;0.025;0.015" repeatCount="indefinite" />
            </feTurbulence>
            <feDisplacementMap in="SourceGraphic" scale="30" />
        </filter>
    </svg>

</body>
</html>
